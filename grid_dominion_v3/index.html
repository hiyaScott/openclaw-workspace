<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRID.DOMINION v3.0 - 无尽进化</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Orbitron', 'Courier New', monospace;
            background: #050508;
            color: #00ff88;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            overflow-x: hidden;
        }
        
        h1 {
            font-size: 2em;
            font-weight: 900;
            text-shadow: 0 0 10px #00ff88, 0 0 20px #00ff88, 0 0 40px #00aa66;
            margin-bottom: 5px;
            letter-spacing: 4px;
            animation: titlePulse 2s ease-in-out infinite;
        }
        
        @keyframes titlePulse {
            0%, 100% { text-shadow: 0 0 10px #00ff88, 0 0 20px #00ff88, 0 0 40px #00aa66; }
            50% { text-shadow: 0 0 20px #00ff88, 0 0 40px #00ff88, 0 0 60px #00aa66; }
        }
        
        .subtitle {
            color: #0088aa;
            margin-bottom: 10px;
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .level-indicator {
            color: #ffaa00;
            font-size: 1em;
            margin-bottom: 8px;
            text-shadow: 0 0 10px #ffaa00;
        }
        
        .game-info {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
            font-size: 0.9em;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .info-item {
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.1) 0%, rgba(0, 136, 170, 0.1) 100%);
            border: 1px solid #00ff88;
            padding: 6px 12px;
            border-radius: 6px;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.2);
        }
        
        .info-label {
            color: #0088aa;
            font-size: 0.65em;
            text-transform: uppercase;
        }
        
        .info-value {
            font-size: 1.1em;
            font-weight: bold;
        }
        
        #gameCanvas {
            border: 2px solid #00ff88;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.4), inset 0 0 40px rgba(0, 255, 136, 0.1);
            background: #080810;
            border-radius: 4px;
        }
        
        .combo-display {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3em;
            font-weight: bold;
            color: #ffaa00;
            text-shadow: 0 0 20px #ffaa00;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 100;
        }
        
        .combo-display.show {
            opacity: 1;
            animation: comboPop 0.5s ease-out;
        }
        
        @keyframes comboPop {
            0% { transform: translate(-50%, -50%) scale(0.5); }
            50% { transform: translate(-50%, -50%) scale(1.2); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
        
        .controls {
            margin-top: 10px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        button {
            background: linear-gradient(135deg, #00ff88 0%, #0088aa 100%);
            color: #000;
            border: none;
            padding: 8px 16px;
            font-size: 0.85em;
            font-weight: bold;
            font-family: 'Orbitron', monospace;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.5);
        }
        
        .instructions {
            margin-top: 10px;
            color: #0088aa;
            text-align: center;
            line-height: 1.5;
            font-size: 0.8em;
        }
        
        .instructions span {
            color: #00ff88;
            background: rgba(0, 255, 136, 0.15);
            padding: 2px 8px;
            border-radius: 3px;
            margin: 0 3px;
        }
        
        .status-message {
            margin-top: 10px;
            font-size: 1.1em;
            min-height: 25px;
            text-align: center;
            font-weight: bold;
        }
        
        .status-message.win {
            color: #00ff00;
            text-shadow: 0 0 15px #00ff00;
            animation: victoryPulse 0.5s ease-in-out infinite;
        }
        
        .status-message.lose {
            color: #ff4444;
            text-shadow: 0 0 15px #ff4444;
        }
        
        @keyframes victoryPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .skill-bar {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        
        .skill {
            background: linear-gradient(135deg, rgba(0, 136, 170, 0.2) 0%, rgba(0, 68, 102, 0.2) 100%);
            border: 2px solid #0088aa;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.75em;
            text-align: center;
            transition: all 0.3s;
            position: relative;
        }
        
        .skill.ready {
            border-color: #00ff88;
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.2) 0%, rgba(0, 170, 136, 0.2) 100%);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
            animation: skillReady 1s ease-in-out infinite;
        }
        
        @keyframes skillReady {
            0%, 100% { box-shadow: 0 0 15px rgba(0, 255, 136, 0.3); }
            50% { box-shadow: 0 0 25px rgba(0, 255, 136, 0.5); }
        }
        
        .skill-key {
            color: #00ff88;
            font-weight: bold;
            font-size: 1.2em;
            display: block;
        }
        
        .audio-controls {
            position: fixed;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 8px;
        }
        
        .audio-btn {
            background: rgba(0, 255, 136, 0.2);
            border: 1px solid #00ff88;
            color: #00ff88;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75em;
        }
        
        .upgrade-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(5, 5, 8, 0.95);
            border: 2px solid #00ff88;
            border-radius: 10px;
            padding: 20px;
            display: none;
            z-index: 200;
            box-shadow: 0 0 50px rgba(0, 255, 136, 0.5);
        }
        
        .upgrade-panel.show {
            display: block;
        }
        
        .upgrade-panel h3 {
            color: #00ff88;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .upgrade-option {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid #00ff88;
            padding: 10px 15px;
            margin: 10px 0;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .upgrade-option:hover {
            background: rgba(0, 255, 136, 0.2);
            transform: translateX(5px);
        }
    </style>
</head>
<body>
    <div class="audio-controls">
        <button class="audio-btn" onclick="toggleMusic()">🎵 音乐</button>
        <button class="audio-btn" onclick="toggleSFX()">🔊 音效</button>
    </div>

    <div class="combo-display" id="comboDisplay"></div>

    <div class="upgrade-panel" id="upgradePanel">
        <h3>⚡ 选择升级 ⚡</h3>
        <div class="upgrade-option" onclick="game.selectUpgrade(0)">
            <strong>🔥 火焰强化</strong><br>
            领地伤害 +50%
        </div>
        <div class="upgrade-option" onclick="game.selectUpgrade(1)">
            <strong>⚡ 闪电冲刺</strong><br>
            冲刺距离 +2格，冷却 -1秒
        </div>
        <div class="upgrade-option" onclick="game.selectUpgrade(2)">
            <strong>🛡️ 护盾精通</strong><br>
            护盾持续时间 +3秒
        </div>
        <div class="upgrade-option" onclick="game.selectUpgrade(3)">
            <strong>💚 生命恢复</strong><br>
            最大生命值 +30，立即恢复满血
        </div>
    </div>

    <h1>GRID.DOMINION</h1>
    <div class="subtitle">区域控制 Roguelike 动作游戏</div>
    <div class="level-indicator" id="level">区域 1 - 波次 1</div>
    
    <div class="game-info">
        <div class="info-item">
            <div class="info-label">生命值</div>
            <div class="info-value" id="health">100</div>
        </div>
        <div class="info-item">
            <div class="info-label">占领率</div>
            <div class="info-value" id="dominion">0%</div>
        </div>
        <div class="info-item">
            <div class="info-label">分数</div>
            <div class="info-value" id="score">0</div>
        </div>
        <div class="info-item">
            <div class="info-label">连击</div>
            <div class="info-value" id="combo">x1</div>
        </div>
        <div class="info-item">
            <div class="info-label">击杀</div>
            <div class="info-value" id="kills">0</div>
        </div>
    </div>
    
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <div class="status-message" id="status">点击格子开始占领领地！占领80%生成出口</div>
    
    <div class="skill-bar">
        <div class="skill ready" id="skillQ">
            <span class="skill-key">Q</span>
            <div>区域爆破</div>
        </div>
        <div class="skill ready" id="skillE">
            <span class="skill-key">E</span>
            <div>护盾</div>
        </div>
        <div class="skill ready" id="skillR">
            <span class="skill-key">R</span>
            <div>加速</div>
        </div>
    </div>
    
    <div class="controls">
        <button onclick="game.restart()">🔄 重新开始</button>
        <button onclick="game.togglePause()">⏸️ 暂停</button>
    </div>
    
    <div class="instructions">
        <span>WASD</span>移动 <span>空格</span>冲刺 <span>Q/E/R</span>技能<br>
        连击系统：快速击杀敌人获得分数加成 | 每关结束可选择升级强化
    </div>

    <script>
        // 音频系统
        const AudioSys = {
            musicEnabled: true,
            sfxEnabled: true,
            ctx: null,
            
            init() {
                try {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                } catch(e) {}
            },
            
            playTone(freq, duration, type = 'sine', volume = 0.3) {
                if (!this.sfxEnabled || !this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.frequency.value = freq;
                osc.type = type;
                gain.gain.setValueAtTime(volume, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + duration);
            },
            
            playClaim() {
                this.playTone(880, 0.1, 'sine', 0.2);
                setTimeout(() => this.playTone(1100, 0.15, 'sine', 0.15), 50);
            },
            
            playExplosion() {
                this.playTone(100, 0.3, 'sawtooth', 0.4);
                this.playTone(80, 0.4, 'square', 0.3);
            },
            
            playCombo(combo) {
                const baseFreq = 440 + combo * 50;
                this.playTone(baseFreq, 0.2, 'sine', 0.3);
                setTimeout(() => this.playTone(baseFreq * 1.5, 0.3, 'sine', 0.25), 100);
            },
            
            playHit() {
                this.playTone(200, 0.15, 'sawtooth', 0.3);
            },
            
            playLevelUp() {
                [440, 554, 659, 880].forEach((freq, i) => {
                    setTimeout(() => this.playTone(freq, 0.2, 'sine', 0.25), i * 100);
                });
            },
            
            playBGM() {
                if (!this.musicEnabled || !this.ctx) return;
                const loop = () => {
                    if (!this.musicEnabled) return;
                    this.playTone(55, 0.5, 'sine', 0.05);
                    setTimeout(() => this.playTone(82, 0.5, 'sine', 0.05), 500);
                    setTimeout(() => loop(), 1000);
                };
                loop();
            }
        };
        
        function toggleMusic() { AudioSys.musicEnabled = !AudioSys.musicEnabled; if (AudioSys.musicEnabled) AudioSys.playBGM(); }
        function toggleSFX() { AudioSys.sfxEnabled = !AudioSys.sfxEnabled; }
        
        // 游戏主类
        class Game {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.GRID_WIDTH = 16;
                this.GRID_HEIGHT = 12;
                this.CELL_SIZE = 40;
                
                this.level = 1;
                this.wave = 1;
                this.upgrades = {
                    dominionDamage: 1,
                    dashDistance: 3,
                    dashCooldown: 3,
                    shieldDuration: 5,
                    maxHealthBonus: 0
                };
                
                this.resetGame();
                this.setupInputs();
                AudioSys.init();
                AudioSys.playBGM();
                
                this.lastTime = 0;
                requestAnimationFrame((t) => this.loop(t));
            }
            
            resetGame() {
                this.grid = [];
                this.player = { 
                    x: 2, y: 2, 
                    health: 100 + this.upgrades.maxHealthBonus, 
                    maxHealth: 100 + this.upgrades.maxHealthBonus,
                    shieldTime: 0, speedTime: 0,
                    dashCooldown: 0
                };
                this.enemies = [];
                this.particles = [];
                this.score = 0;
                this.dominionPercent = 0;
                this.gameTime = 0;
                this.gameOver = false;
                this.paused = false;
                this.exitOpen = false;
                this.exitPos = null;
                this.keys = {};
                
                // 连击系统
                this.combo = 0;
                this.comboTimer = 0;
                this.totalKills = 0;
                
                this.skills = {
                    Q: { cooldown: 0, maxCooldown: 8 },
                    E: { cooldown: 0, maxCooldown: 15 },
                    R: { cooldown: 0, maxCooldown: 12 }
                };
                
                this.generateLevel();
            }
            
            generateLevel() {
                this.grid = [];
                for (let y = 0; y < this.GRID_HEIGHT; y++) {
                    let row = [];
                    for (let x = 0; x < this.GRID_WIDTH; x++) {
                        row.push({
                            x, y,
                            state: (x === 0 || x === this.GRID_WIDTH - 1 || 
                                   y === 0 || y === this.GRID_HEIGHT - 1) ? 'wall' : 'empty',
                            isDominion: false
                        });
                    }
                    this.grid.push(row);
                }
                
                // 随机关卡生成算法
                const patterns = ['random', 'maze', 'rooms'];
                const pattern = patterns[Math.floor(Math.random() * patterns.length)];
                this.generatePattern(pattern);
                
                this.player.x = 2;
                this.player.y = 2;
                this.claimCell(2, 2);
                
                // 生成敌人波次
                this.spawnWave();
                
                this.exitOpen = false;
                this.exitPos = this.findFarthestPosition();
                this.grid[this.exitPos.y][this.exitPos.x].state = 'empty';
                
                this.updateUI();
            }
            
            generatePattern(type) {
                if (type === 'random') {
                    const wallCount = 10 + this.level * 2;
                    for (let i = 0; i < wallCount; i++) {
                        let x = Math.floor(Math.random() * (this.GRID_WIDTH - 2)) + 1;
                        let y = Math.floor(Math.random() * (this.GRID_HEIGHT - 2)) + 1;
                        if (!(x === 2 && y === 2)) {
                            this.grid[y][x].state = 'wall';
                        }
                    }
                } else if (type === 'maze') {
                    // 生成迷宫式墙壁
                    for (let y = 2; y < this.GRID_HEIGHT - 2; y += 2) {
                        for (let x = 2; x < this.GRID_WIDTH - 2; x += 2) {
                            if (Math.random() > 0.3) {
                                this.grid[y][x].state = 'wall';
                            }
                        }
                    }
                } else if (type === 'rooms') {
                    // 生成房间
                    for (let i = 0; i < 4; i++) {
                        let rx = Math.floor(Math.random() * (this.GRID_WIDTH - 6)) + 2;
                        let ry = Math.floor(Math.random() * (this.GRID_HEIGHT - 6)) + 2;
                        for (let y = ry; y < ry + 3; y++) {
                            for (let x = rx; x < rx + 3; x++) {
                                if (x > 0 && x < this.GRID_WIDTH - 1 && y > 0 && y < this.GRID_HEIGHT - 1) {
                                    this.grid[y][x].state = 'wall';
                                }
                            }
                        }
                    }
                }
            }
            
            findFarthestPosition() {
                // BFS找到离玩家最远的可达位置
                let queue = [{x: 2, y: 2, dist: 0}];
                let visited = new Set(['2,2']);
                let farthest = {x: 2, y: 2, dist: 0};
                
                while (queue.length > 0) {
                    let curr = queue.shift();
                    if (curr.dist > farthest.dist) {
                        farthest = curr;
                    }
                    
                    const dirs = [[0,1], [0,-1], [1,0], [-1,0]];
                    for (let [dx, dy] of dirs) {
                        let nx = curr.x + dx, ny = curr.y + dy;
                        if (nx > 0 && nx < this.GRID_WIDTH - 1 && 
                            ny > 0 && ny < this.GRID_HEIGHT - 1 &&
                            this.grid[ny][nx].state !== 'wall' &&
                            !visited.has(`${nx},${ny}`)) {
                            visited.add(`${nx},${ny}`);
                            queue.push({x: nx, y: ny, dist: curr.dist + 1});
                        }
                    }
                }
                return {x: farthest.x, y: farthest.y};
            }
            
            spawnWave() {
                const baseCount = 5 + this.level * 2 + this.wave * 2;
                for (let i = 0; i < baseCount; i++) {
                    this.spawnEnemy();
                }
            }
            
            spawnEnemy() {
                let x, y, attempts = 0;
                do {
                    x = Math.floor(Math.random() * (this.GRID_WIDTH - 2)) + 1;
                    y = Math.floor(Math.random() * (this.GRID_HEIGHT - 2)) + 1;
                    attempts++;
                } while ((this.grid[y][x].state === 'wall' || 
                         (Math.abs(x - this.player.x) < 5 && Math.abs(y - this.player.y) < 5)) && 
                         attempts < 50);
                
                if (attempts < 50) {
                    const types = ['normal', 'fast', 'tank', 'ranged'];
                    const type = types[Math.min(Math.floor(Math.random() * types.length + this.level / 3), types.length - 1)];
                    
                    let enemy = {
                        x, y,
                        health: 30,
                        maxHealth: 30,
                        speed: 0.015,
                        inDominion: false,
                        type: type
                    };
                    
                    // 根据类型调整属性
                    switch(type) {
                        case 'fast':
                            enemy.speed = 0.025;
                            enemy.health = 20;
                            break;
                        case 'tank':
                            enemy.speed = 0.01;
                            enemy.health = 60;
                            break;
                        case 'ranged':
                            enemy.speed = 0.012;
                            enemy.health = 25;
                            enemy.attackRange = 5;
                            break;
                    }
                    
                    enemy.maxHealth = enemy.health;
                    this.enemies.push(enemy);
                }
            }
            
            claimCell(x, y) {
                if (this.grid[y][x].state !== 'wall' && !this.grid[y][x].isDominion) {
                    this.grid[y][x].isDominion = true;
                    this.score += 10 * (1 + this.combo * 0.1);
                    this.createParticles(x, y, '#00ff88', 8);
                    AudioSys.playClaim();
                    this.updateDominionPercent();
                    return true;
                }
                return false;
            }
            
            updateDominionPercent() {
                let dominionCount = 0;
                let totalCells = 0;
                for (let y = 1; y < this.GRID_HEIGHT - 1; y++) {
                    for (let x = 1; x < this.GRID_WIDTH - 1; x++) {
                        if (this.grid[y][x].state !== 'wall') {
                            totalCells++;
                            if (this.grid[y][x].isDominion) dominionCount++;
                        }
                    }
                }
                this.dominionPercent = Math.floor((dominionCount / totalCells) * 100);
                
                if (this.dominionPercent >= 80 && !this.exitOpen) {
                    this.exitOpen = true;
                    this.createParticles(this.exitPos.x, this.exitPos.y, '#ffaa00', 20);
                    AudioSys.playLevelUp();
                    this.showStatus('🚪 出口已开启！前往绿色传送门', 'win');
                }
            }
            
            createParticles(x, y, color, count = 5) {
                const px = x * this.CELL_SIZE + this.CELL_SIZE / 2 + 80;
                const py = y * this.CELL_SIZE + this.CELL_SIZE / 2 + 40;
                for (let i = 0; i < count; i++) {
                    const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
                    const speed = 2 + Math.random() * 4;
                    this.particles.push({
                        x: px, y: py,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        life: 1,
                        color: color,
                        size: 3 + Math.random() * 4
                    });
                }
            }
            
            setupInputs() {
                window.addEventListener('keydown', (e) => {
                    this.keys[e.key.toLowerCase()] = true;
                    
                    if (e.code === 'Space') {
                        e.preventDefault();
                        this.dash();
                    }
                    if (e.key === 'q' || e.key === 'Q') this.useSkill('Q');
                    if (e.key === 'e' || e.key === 'E') this.useSkill('E');
                    if (e.key === 'r' || e.key === 'R') this.useSkill('R');
                });
                
                window.addEventListener('keyup', (e) => {
                    this.keys[e.key.toLowerCase()] = false;
                });
            }
            
            dash() {
                if (this.gameOver || this.player.dashCooldown > 0) return;
                
                let dx = 0, dy = 0;
                if (this.keys['w']) dy = -1;
                if (this.keys['s']) dy = 1;
                if (this.keys['a']) dx = -1;
                if (this.keys['d']) dx = 1;
                
                if (dx !== 0 || dy !== 0) {
                    this.player.dashCooldown = this.upgrades.dashCooldown;
                    
                    for (let i = 1; i <= this.upgrades.dashDistance; i++) {
                        let nx = Math.round(this.player.x + dx * i);
                        let ny = Math.round(this.player.y + dy * i);
                        if (this.isValidMove(nx, ny)) {
                            this.player.x = nx;
                            this.player.y = ny;
                            this.claimCell(nx, ny);
                            this.createParticles(nx, ny, '#00ffff', 3);
                        }
                    }
                }
            }
            
            useSkill(skill) {
                if (this.gameOver || this.skills[skill].cooldown > 0) return;
                
                this.skills[skill].cooldown = this.skills[skill].maxCooldown;
                
                switch(skill) {
                    case 'Q':
                        AudioSys.playExplosion();
                        for (let dy = -1; dy <= 1; dy++) {
                            for (let dx = -1; dx <= 1; dx++) {
                                let nx = Math.round(this.player.x) + dx;
                                let ny = Math.round(this.player.y) + dy;
                                this.createParticles(nx, ny, '#ff6600', 10);
                                
                                this.enemies.forEach(enemy => {
                                    if (Math.abs(enemy.x - nx) < 1.5 && Math.abs(enemy.y - ny) < 1.5) {
                                        enemy.health -= 50;
                                        this.createParticles(enemy.x, enemy.y, '#ff0000', 5);
                                    }
                                });
                            }
                        }
                        break;
                    case 'E':
                        this.player.shieldTime = this.upgrades.shieldDuration;
                        AudioSys.playTone(440, 0.5, 'sine', 0.3);
                        break;
                    case 'R':
                        this.player.speedTime = 5;
                        AudioSys.playTone(880, 0.3, 'sine', 0.3);
                        break;
                }
                
                this.updateSkillUI();
            }
            
            isValidMove(x, y) {
                return x >= 0 && x < this.GRID_WIDTH && 
                       y >= 0 && y < this.GRID_HEIGHT && 
                       this.grid[y][x].state !== 'wall';
            }
            
            nextLevel() {
                this.level++;
                this.wave = 1;
                this.score += 1000;
                AudioSys.playLevelUp();
                
                // 显示升级面板
                document.getElementById('upgradePanel').classList.add('show');
                this.paused = true;
            }
            
            selectUpgrade(index) {
                document.getElementById('upgradePanel').classList.remove('show');
                this.paused = false;
                
                switch(index) {
                    case 0: // 火焰强化
                        this.upgrades.dominionDamage += 0.5;
                        break;
                    case 1: // 闪电冲刺
                        this.upgrades.dashDistance += 2;
                        this.upgrades.dashCooldown = Math.max(1, this.upgrades.dashCooldown - 1);
                        break;
                    case 2: // 护盾精通
                        this.upgrades.shieldDuration += 3;
                        break;
                    case 3: // 生命恢复
                        this.upgrades.maxHealthBonus += 30;
                        this.player.maxHealth += 30;
                        this.player.health = this.player.maxHealth;
                        break;
                }
                
                this.showStatus(`已选择升级！进入区域 ${this.level}`, 'win');
                document.getElementById('level').textContent = `区域 ${this.level} - 波次 ${this.wave}`;
                this.generateLevel();
            }
            
            addCombo() {
                this.combo++;
                this.comboTimer = 3;
                this.totalKills++;
                
                // 显示连击
                if (this.combo >= 2) {
                    const comboDisplay = document.getElementById('comboDisplay');
                    comboDisplay.textContent = `${this.combo} 连击!`;
                    comboDisplay.classList.add('show');
                    setTimeout(() => comboDisplay.classList.remove('show'), 1000);
                    AudioSys.playCombo(this.combo);
                }
            }
            
            update(delta) {
                if (this.gameOver || this.paused) return;
                
                this.gameTime += delta;
                
                // 更新连击
                if (this.comboTimer > 0) {
                    this.comboTimer -= delta;
                    if (this.comboTimer <= 0) {
                        this.combo = 0;
                    }
                }
                
                // 更新冷却
                if (this.player.dashCooldown > 0) this.player.dashCooldown -= delta;
                for (let key in this.skills) {
                    if (this.skills[key].cooldown > 0) {
                        this.skills[key].cooldown -= delta;
                        if (this.skills[key].cooldown < 0) this.skills[key].cooldown = 0;
                    }
                }
                
                // 玩家移动
                let moveInterval = this.player.speedTime > 0 ? 0.06 : 0.12;
                if (this.gameTime % moveInterval < delta) {
                    let dx = 0, dy = 0;
                    if (this.keys['w']) dy = -1;
                    if (this.keys['s']) dy = 1;
                    if (this.keys['a']) dx = -1;
                    if (this.keys['d']) dx = 1;
                    
                    if (dx !== 0 || dy !== 0) {
                        let nx = Math.round(this.player.x + dx);
                        let ny = Math.round(this.player.y + dy);
                        if (this.isValidMove(nx, ny)) {
                            this.player.x = nx;
                            this.player.y = ny;
                            this.claimCell(nx, ny);
                            
                            if (this.exitOpen && nx === this.exitPos.x && ny === this.exitPos.y) {
                                this.nextLevel();
                                return;
                            }
                        }
                    }
                }
                
                if (this.player.shieldTime > 0) this.player.shieldTime -= delta;
                if (this.player.speedTime > 0) this.player.speedTime -= delta;
                
                // 更新敌人
                this.enemies.forEach((enemy, index) => {
                    const ex = Math.floor(enemy.x);
                    const ey = Math.floor(enemy.y);
                    if (ex >= 0 && ex < this.GRID_WIDTH && ey >= 0 && ey < this.GRID_HEIGHT) {
                        enemy.inDominion = this.grid[ey][ex].isDominion;
                    }
                    
                    if (enemy.inDominion) {
                        enemy.health -= 5 * this.upgrades.dominionDamage * delta;
                    }
                    
                    let dx = this.player.x - enemy.x;
                    let dy = this.player.y - enemy.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist > 0.3) {
                        let speed = enemy.inDominion ? enemy.speed * 0.7 : enemy.speed;
                        enemy.x += (dx / dist) * speed;
                        enemy.y += (dy / dist) * speed;
                    }
                    
                    // 远程敌人攻击
                    if (enemy.type === 'ranged' && dist < enemy.attackRange && Math.random() < 0.02) {
                        this.player.health -= 5;
                        this.createParticles(this.player.x, this.player.y, '#ff0000', 5);
                    }
                    
                    if (dist < 0.6 && this.player.shieldTime <= 0) {
                        this.player.health -= 15;
                        enemy.health = 0;
                        AudioSys.playHit();
                        this.createParticles(this.player.x, this.player.y, '#ff0000', 10);
                    }
                    
                    if (enemy.health <= 0) {
                        this.createParticles(enemy.x, enemy.y, '#ff8800', 15);
                        this.enemies.splice(index, 1);
                        this.score += (50 + this.level * 10) * (1 + this.combo * 0.2);
                        this.addCombo();
                    }
                });
                
                // 新波次
                if (this.enemies.length === 0 && !this.exitOpen) {
                    this.wave++;
                    this.spawnWave();
                    this.showStatus(`波次 ${this.wave} 来袭！`, 'win');
                    document.getElementById('level').textContent = `区域 ${this.level} - 波次 ${this.wave}`;
                }
                
                if (this.player.health <= 0) {
                    this.lose();
                }
                
                this.updateUI();
            }
            
            draw() {
                const ctx = this.ctx;
                ctx.fillStyle = '#080810';
                ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                const offsetX = 80;
                const offsetY = 40;
                
                // 背景网格
                ctx.strokeStyle = 'rgba(0, 255, 136, 0.03)';
                for (let i = 0; i < this.canvas.width; i += 20) {
                    ctx.beginPath();
                    ctx.moveTo(i, 0);
                    ctx.lineTo(i, this.canvas.height);
                    ctx.stroke();
                }
                
                // 绘制游戏网格
                for (let y = 0; y < this.GRID_HEIGHT; y++) {
                    for (let x = 0; x < this.GRID_WIDTH; x++) {
                        let cell = this.grid[y][x];
                        let px = x * this.CELL_SIZE + offsetX;
                        let py = y * this.CELL_SIZE + offsetY;
                        
                        if (cell.state === 'wall') {
                            ctx.fillStyle = '#1a1a2e';
                            ctx.fillRect(px, py, this.CELL_SIZE - 2, this.CELL_SIZE - 2);
                        } else if (cell.isDominion) {
                            const gradient = ctx.createRadialGradient(
                                px + this.CELL_SIZE/2, py + this.CELL_SIZE/2, 0,
                                px + this.CELL_SIZE/2, py + this.CELL_SIZE/2, this.CELL_SIZE
                            );
                            gradient.addColorStop(0, 'rgba(0, 255, 136, 0.4)');
                            gradient.addColorStop(1, 'rgba(0, 255, 136, 0.1)');
                            ctx.fillStyle = gradient;
                            ctx.fillRect(px, py, this.CELL_SIZE - 2, this.CELL_SIZE - 2);
                            ctx.strokeStyle = '#00ff88';
                            ctx.strokeRect(px, py, this.CELL_SIZE - 2, this.CELL_SIZE - 2);
                        } else {
                            ctx.fillStyle = '#0f0f1a';
                            ctx.fillRect(px, py, this.CELL_SIZE - 2, this.CELL_SIZE - 2);
                        }
                    }
                }
                
                // 绘制出口
                if (this.exitOpen) {
                    const px = this.exitPos.x * this.CELL_SIZE + offsetX;
                    const py = this.exitPos.y * this.CELL_SIZE + offsetY;
                    const pulse = Math.sin(Date.now() / 200) * 0.3 + 0.7;
                    const gradient = ctx.createRadialGradient(
                        px + this.CELL_SIZE/2, py + this.CELL_SIZE/2, 0,
                        px + this.CELL_SIZE/2, py + this.CELL_SIZE/2, this.CELL_SIZE
                    );
                    gradient.addColorStop(0, `rgba(0, 255, 0, ${pulse})`);
                    gradient.addColorStop(1, 'rgba(0, 255, 0, 0)');
                    ctx.fillStyle = gradient;
                    ctx.fillRect(px - 10, py - 10, this.CELL_SIZE + 20, this.CELL_SIZE + 20);
                    ctx.fillStyle = '#00ff00';
                    ctx.font = 'bold 24px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('🚪', px + this.CELL_SIZE/2, py + this.CELL_SIZE/2 + 8);
                    ctx.textAlign = 'left';
                }
                
                // 绘制敌人
                this.enemies.forEach(enemy => {
                    const px = enemy.x * this.CELL_SIZE + offsetX + this.CELL_SIZE / 2;
                    const py = enemy.y * this.CELL_SIZE + offsetY + this.CELL_SIZE / 2;
                    
                    const colors = {
                        normal: '#ff4444',
                        fast: '#ff8844',
                        tank: '#8844ff',
                        ranged: '#44ff88'
                    };
                    
                    if (enemy.inDominion) {
                        ctx.shadowColor = colors[enemy.type];
                        ctx.shadowBlur = 15;
                    }
                    
                    ctx.fillStyle = colors[enemy.type];
                    ctx.beginPath();
                    ctx.moveTo(px, py - 14);
                    ctx.lineTo(px + 14, py + 10);
                    ctx.lineTo(px - 14, py + 10);
                    ctx.closePath();
                    ctx.fill();
                    
                    ctx.shadowBlur = 0;
                    
                    // 血条
                    ctx.fillStyle = '#000';
                    ctx.fillRect(px - 14, py - 22, 28, 4);
                    ctx.fillStyle = enemy.health > enemy.maxHealth * 0.5 ? '#00ff88' : '#ff4444';
                    ctx.fillRect(px - 14, py - 22, 28 * (enemy.health / enemy.maxHealth), 4);
                });
                
                // 绘制玩家
                const px = this.player.x * this.CELL_SIZE + offsetX + this.CELL_SIZE / 2;
                const py = this.player.y * this.CELL_SIZE + offsetY + this.CELL_SIZE / 2;
                
                if (this.player.shieldTime > 0) {
                    ctx.strokeStyle = '#00ffff';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(px, py, 22, 0, Math.PI * 2);
                    ctx.stroke();
                }
                
                ctx.fillStyle = '#00ff88';
                ctx.shadowColor = '#00ff88';
                ctx.shadowBlur = 20;
                ctx.beginPath();
                ctx.moveTo(px, py - 16);
                ctx.lineTo(px + 14, py + 12);
                ctx.lineTo(px - 14, py + 12);
                ctx.closePath();
                ctx.fill();
                ctx.shadowBlur = 0;
                
                // 绘制粒子
                this.particles.forEach((p, i) => {
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.life;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                    
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life -= 0.02;
                    
                    if (p.life <= 0) this.particles.splice(i, 1);
                });
            }
            
            updateUI() {
                document.getElementById('health').textContent = Math.max(0, Math.floor(this.player.health));
                document.getElementById('dominion').textContent = this.dominionPercent + '%';
                document.getElementById('score').textContent = Math.floor(this.score);
                document.getElementById('combo').textContent = 'x' + this.combo;
                document.getElementById('kills').textContent = this.totalKills;
                
                for (let key in this.skills) {
                    let el = document.getElementById('skill' + key);
                    if (this.skills[key].cooldown <= 0) {
                        el.classList.add('ready');
                        el.style.opacity = '1';
                    } else {
                        el.classList.remove('ready');
                        el.style.opacity = '0.4';
                    }
                }
            }
            
            showStatus(msg, type = '') {
                const status = document.getElementById('status');
                status.textContent = msg;
                status.className = 'status-message' + (type ? ' ' + type : '');
            }
            
            lose() {
                this.gameOver = true;
                AudioSys.playTone(150, 1, 'sawtooth', 0.5);
                this.showStatus(`💀 游戏结束！击杀: ${this.totalKills} 分数: ${Math.floor(this.score)}`, 'lose');
            }
            
            restart() {
                this.level = 1;
                this.wave = 1;
                this.upgrades = {
                    dominionDamage: 1,
                    dashDistance: 3,
                    dashCooldown: 3,
                    shieldDuration: 5,
                    maxHealthBonus: 0
                };
                this.resetGame();
                document.getElementById('level').textContent = '区域 1 - 波次 1';
                this.showStatus('点击格子开始占领领地！占领80%生成出口');
            }
            
            togglePause() {
                this.paused = !this.paused;
                this.showStatus(this.paused ? '⏸️ 游戏暂停' : '▶️ 游戏继续');
            }
            
            loop(timestamp) {
                let delta = (timestamp - this.lastTime) / 1000;
                this.lastTime = timestamp;
                if (delta > 0.1) delta = 0.1;
                
                this.update(delta);
                this.draw();
                requestAnimationFrame((t) => this.loop(t));
            }
        }
        
        const game = new Game();
    </script>
</body>
