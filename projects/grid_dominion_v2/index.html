<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRID.DOMINION v2.0 区域控制Roguelike | 虾折腾</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Orbitron', 'Courier New', monospace;
            background: #050508;
            color: #00ff88;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            overflow-x: hidden;
        }
        
        h1 {
            font-size: 2.2em;
            font-weight: 900;
            text-shadow: 0 0 10px #00ff88, 0 0 20px #00ff88, 0 0 40px #00aa66;
            margin-bottom: 5px;
            letter-spacing: 6px;
            animation: titlePulse 2s ease-in-out infinite;
        }
        
        @keyframes titlePulse {
            0%, 100% { text-shadow: 0 0 10px #00ff88, 0 0 20px #00ff88, 0 0 40px #00aa66; }
            50% { text-shadow: 0 0 20px #00ff88, 0 0 40px #00ff88, 0 0 60px #00aa66; }
        }
        
        .subtitle {
            color: #0088aa;
            margin-bottom: 15px;
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        
        .level-indicator {
            color: #ffaa00;
            font-size: 1.1em;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #ffaa00;
        }
        
        .game-info {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            font-size: 1em;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .info-item {
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.1) 0%, rgba(0, 136, 170, 0.1) 100%);
            border: 1px solid #00ff88;
            padding: 8px 16px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
            transition: all 0.3s;
        }
        
        .info-item:hover {
            box-shadow: 0 0 25px rgba(0, 255, 136, 0.4);
            transform: translateY(-2px);
        }
        
        .info-label {
            color: #0088aa;
            font-size: 0.7em;
            text-transform: uppercase;
        }
        
        .info-value {
            font-size: 1.2em;
            font-weight: bold;
        }
        
        #gameCanvas {
            border: 3px solid #00ff88;
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.4), inset 0 0 60px rgba(0, 255, 136, 0.1);
            background: #080810;
            border-radius: 4px;
        }
        
        .controls {
            margin-top: 15px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        button {
            background: linear-gradient(135deg, #00ff88 0%, #0088aa 100%);
            color: #000;
            border: none;
            padding: 10px 20px;
            font-size: 0.9em;
            font-weight: bold;
            font-family: 'Orbitron', monospace;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 255, 136, 0.5);
        }
        
        button:active {
            transform: translateY(-1px);
        }
        
        .instructions {
            margin-top: 15px;
            color: #0088aa;
            text-align: center;
            line-height: 1.6;
            font-size: 0.85em;
        }
        
        .instructions span {
            color: #00ff88;
            background: rgba(0, 255, 136, 0.15);
            padding: 3px 10px;
            border-radius: 4px;
            margin: 0 4px;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }
        
        .status-message {
            margin-top: 12px;
            font-size: 1.2em;
            min-height: 30px;
            text-align: center;
            font-weight: bold;
        }
        
        .status-message.win {
            color: #00ff00;
            text-shadow: 0 0 15px #00ff00, 0 0 30px #00ff00;
            animation: victoryPulse 0.5s ease-in-out infinite;
        }
        
        @keyframes victoryPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .status-message.lose {
            color: #ff4444;
            text-shadow: 0 0 15px #ff4444, 0 0 30px #ff4444;
        }
        
        .skill-bar {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }
        
        .skill {
            background: linear-gradient(135deg, rgba(0, 136, 170, 0.2) 0%, rgba(0, 68, 102, 0.2) 100%);
            border: 2px solid #0088aa;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.8em;
            text-align: center;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .skill.ready {
            border-color: #00ff88;
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.2) 0%, rgba(0, 170, 136, 0.2) 100%);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
            animation: skillReady 1s ease-in-out infinite;
        }
        
        @keyframes skillReady {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 255, 136, 0.3); }
            50% { box-shadow: 0 0 30px rgba(0, 255, 136, 0.5); }
        }
        
        .skill-key {
            color: #00ff88;
            font-weight: bold;
            font-size: 1.3em;
            display: block;
            margin-bottom: 3px;
        }
        
        .audio-controls {
            position: fixed;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 10px;
        }
        
        .audio-btn {
            background: rgba(0, 255, 136, 0.2);
            border: 1px solid #00ff88;
            color: #00ff88;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8em;
        }
        
        .audio-btn:hover {
            background: rgba(0, 255, 136, 0.3);
        }
    </style>
</head>
<body>
    <div class="audio-controls">
        <button class="audio-btn" onclick="toggleMusic()">🎵 音乐</button>
        <button class="audio-btn" onclick="toggleSFX()">🔊 音效</button>
    </div>

    <h1>GRID.DOMINION</h1>
    <div class="subtitle">区域控制 Roguelike 动作游戏</div>
    <div class="level-indicator" id="level">区域 1</div>
    
    <div class="game-info">
        <div class="info-item">
            <div class="info-label">生命值</div>
            <div class="info-value" id="health">100</div>
        </div>
        <div class="info-item">
            <div class="info-label">占领率</div>
            <div class="info-value" id="dominion">0%</div>
        </div>
        <div class="info-item">
            <div class="info-label">分数</div>
            <div class="info-value" id="score">0</div>
        </div>
        <div class="info-item">
            <div class="info-label">时间</div>
            <div class="info-value" id="time">00:00</div>
        </div>
    </div>
    
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <div class="status-message" id="status">点击格子开始占领领地！占领80%生成出口</div>
    
    <div class="skill-bar">
        <div class="skill ready" id="skillQ">
            <span class="skill-key">Q</span>
            <div>区域爆破</div>
        </div>
        <div class="skill ready" id="skillE">
            <span class="skill-key">E</span>
            <div>护盾</div>
        </div>
        <div class="skill ready" id="skillR">
            <span class="skill-key">R</span>
            <div>加速</div>
        </div>
    </div>
    
    <div class="controls">
        <button onclick="game.restart()">🔄 重新开始</button>
        <button onclick="game.togglePause()">⏸️ 暂停</button>
    </div>
    
    <div class="instructions">
        <span>WASD</span>移动 <span>空格</span>冲刺 <span>Q/E/R</span>技能<br>
        敌人进入领地会掉血 | 占领80%生成出口 | 进入出口进入下一区域
    </div>

    <script>
        // 音频系统
        const AudioSys = {
            musicEnabled: true,
            sfxEnabled: true,
            ctx: null,
            
            init() {
                try {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                } catch(e) {
                    console.log('Web Audio not supported');
                }
            },
            
            playTone(freq, duration, type = 'sine', volume = 0.3) {
                if (!this.sfxEnabled || !this.ctx) return;
                
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                osc.frequency.value = freq;
                osc.type = type;
                gain.gain.setValueAtTime(volume, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                
                osc.start();
                osc.stop(this.ctx.currentTime + duration);
            },
            
            playClaim() {
                this.playTone(880, 0.1, 'sine', 0.2);
                setTimeout(() => this.playTone(1100, 0.15, 'sine', 0.15), 50);
            },
            
            playExplosion() {
                this.playTone(100, 0.3, 'sawtooth', 0.4);
                this.playTone(80, 0.4, 'square', 0.3);
            },
            
            playShoot() {
                this.playTone(600, 0.1, 'square', 0.2);
            },
            
            playHit() {
                this.playTone(200, 0.15, 'sawtooth', 0.3);
            },
            
            playWin() {
                [523, 659, 783, 1046].forEach((freq, i) => {
                    setTimeout(() => this.playTone(freq, 0.3, 'sine', 0.3), i * 150);
                });
            },
            
            playLevelUp() {
                [440, 554, 659, 880].forEach((freq, i) => {
                    setTimeout(() => this.playTone(freq, 0.2, 'sine', 0.25), i * 100);
                });
            },
            
            playBGM() {
                if (!this.musicEnabled || !this.ctx) return;
                // 简单的背景节奏
                const loop = () => {
                    if (!this.musicEnabled) return;
                    this.playTone(55, 0.5, 'sine', 0.05);
                    setTimeout(() => this.playTone(82, 0.5, 'sine', 0.05), 500);
                    setTimeout(() => loop(), 1000);
                };
                loop();
            }
        };
        
        function toggleMusic() {
            AudioSys.musicEnabled = !AudioSys.musicEnabled;
            if (AudioSys.musicEnabled) AudioSys.playBGM();
        }
        
        function toggleSFX() {
            AudioSys.sfxEnabled = !AudioSys.sfxEnabled;
        }
        
        // 游戏主类
        class Game {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.GRID_WIDTH = 16;
                this.GRID_HEIGHT = 12;
                this.CELL_SIZE = 40;
                
                this.level = 1;
                this.resetGame();
                this.setupInputs();
                
                AudioSys.init();
                AudioSys.playBGM();
                
                this.lastTime = 0;
                requestAnimationFrame((t) => this.loop(t));
            }
            
            resetGame() {
                this.grid = [];
                this.player = { 
                    x: 2, y: 2, 
                    health: 100, maxHealth: 100,
                    shieldTime: 0, speedTime: 0,
                    dashCooldown: 0
                };
                this.enemies = [];
                this.particles = [];
                this.score = 0;
                this.dominionPercent = 0;
                this.gameTime = 0;
                this.gameOver = false;
                this.paused = false;
                this.victory = false;
                this.exitOpen = false;
                this.exitPos = null;
                this.keys = {};
                
                this.skills = {
                    Q: { cooldown: 0, maxCooldown: 8 },
                    E: { cooldown: 0, maxCooldown: 15 },
                    R: { cooldown: 0, maxCooldown: 12 }
                };
                
                this.generateLevel();
            }
            
            generateLevel() {
                // 初始化网格
                this.grid = [];
                for (let y = 0; y < this.GRID_HEIGHT; y++) {
                    let row = [];
                    for (let x = 0; x < this.GRID_WIDTH; x++) {
                        row.push({
                            x, y,
                            state: (x === 0 || x === this.GRID_WIDTH - 1 || 
                                   y === 0 || y === this.GRID_HEIGHT - 1) ? 'wall' : 'empty',
                            isDominion: false
                        });
                    }
                    this.grid.push(row);
                }
                
                // 随机墙壁（随关卡增加）
                const wallCount = 12 + this.level * 3;
                for (let i = 0; i < wallCount; i++) {
                    let x = Math.floor(Math.random() * (this.GRID_WIDTH - 2)) + 1;
                    let y = Math.floor(Math.random() * (this.GRID_HEIGHT - 2)) + 1;
                    if (!(x === 2 && y === 2) && !(x === this.GRID_WIDTH - 3 && y === this.GRID_HEIGHT - 3)) {
                        this.grid[y][x].state = 'wall';
                    }
                }
                
                // 玩家起始位置
                this.player.x = 2;
                this.player.y = 2;
                this.claimCell(2, 2);
                
                // 生成敌人（随关卡增加）
                const enemyCount = 6 + this.level * 2;
                for (let i = 0; i < enemyCount; i++) {
                    this.spawnEnemy();
                }
                
                this.exitOpen = false;
                this.exitPos = { x: this.GRID_WIDTH - 3, y: this.GRID_HEIGHT - 3 };
                this.grid[this.exitPos.y][this.exitPos.x].state = 'empty';
                
                this.updateUI();
            }
            
            spawnEnemy() {
                let x, y;
                let attempts = 0;
                do {
                    x = Math.floor(Math.random() * (this.GRID_WIDTH - 2)) + 1;
                    y = Math.floor(Math.random() * (this.GRID_HEIGHT - 2)) + 1;
                    attempts++;
                } while ((this.grid[y][x].state === 'wall' || 
                         (Math.abs(x - this.player.x) < 4 && Math.abs(y - this.player.y) < 4)) && 
                         attempts < 50);
                
                if (attempts < 50) {
                    this.enemies.push({
                        x, y,
                        health: 30 + this.level * 5,
                        maxHealth: 30 + this.level * 5,
                        speed: 0.015 + this.level * 0.002,
                        inDominion: false,
                        type: Math.random() > 0.7 ? 'fast' : 'normal'
                    });
                }
            }
            
            claimCell(x, y) {
                if (this.grid[y][x].state !== 'wall' && !this.grid[y][x].isDominion) {
                    this.grid[y][x].isDominion = true;
                    this.score += 10;
                    this.createParticles(x, y, '#00ff88', 8);
                    AudioSys.playClaim();
                    this.updateDominionPercent();
                    return true;
                }
                return false;
            }
            
            updateDominionPercent() {
                let dominionCount = 0;
                let totalCells = 0;
                for (let y = 1; y < this.GRID_HEIGHT - 1; y++) {
                    for (let x = 1; x < this.GRID_WIDTH - 1; x++) {
                        if (this.grid[y][x].state !== 'wall') {
                            totalCells++;
                            if (this.grid[y][x].isDominion) dominionCount++;
                        }
                    }
                }
                this.dominionPercent = Math.floor((dominionCount / totalCells) * 100);
                
                // 80% 开启出口
                if (this.dominionPercent >= 80 && !this.exitOpen) {
                    this.exitOpen = true;
                    this.createParticles(this.exitPos.x, this.exitPos.y, '#ffaa00', 20);
                    AudioSys.playLevelUp();
                    this.showStatus('🚪 出口已开启！前往绿色传送门进入下一区域', 'win');
                }
            }
            
            createParticles(x, y, color, count = 5) {
                const px = x * this.CELL_SIZE + this.CELL_SIZE / 2 + 80;
                const py = y * this.CELL_SIZE + this.CELL_SIZE / 2 + 40;
                for (let i = 0; i < count; i++) {
                    const angle = (Math.PI * 2 * i) / count;
                    const speed = 2 + Math.random() * 3;
                    this.particles.push({
                        x: px, y: py,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        life: 1,
                        color: color,
                        size: 3 + Math.random() * 4
                    });
                }
            }
            
            setupInputs() {
                window.addEventListener('keydown', (e) => {
                    this.keys[e.key.toLowerCase()] = true;
                    
                    if (e.code === 'Space') {
                        e.preventDefault();
                        this.dash();
                    }
                    if (e.key === 'q' || e.key === 'Q') this.useSkill('Q');
                    if (e.key === 'e' || e.key === 'E') this.useSkill('E');
                    if (e.key === 'r' || e.key === 'R') this.useSkill('R');
                });
                
                window.addEventListener('keyup', (e) => {
                    this.keys[e.key.toLowerCase()] = false;
                });
            }
            
            dash() {
                if (this.gameOver || this.player.dashCooldown > 0) return;
                
                let dx = 0, dy = 0;
                if (this.keys['w']) dy = -1;
                if (this.keys['s']) dy = 1;
                if (this.keys['a']) dx = -1;
                if (this.keys['d']) dx = 1;
                
                if (dx !== 0 || dy !== 0) {
                    this.player.dashCooldown = 3;
                    AudioSys.playShoot();
                    
                    for (let i = 1; i <= 3; i++) {
                        let nx = Math.round(this.player.x + dx * i);
                        let ny = Math.round(this.player.y + dy * i);
                        if (this.isValidMove(nx, ny)) {
                            this.player.x = nx;
                            this.player.y = ny;
                            this.claimCell(nx, ny);
                            this.createParticles(nx, ny, '#00ffff', 3);
                        }
                    }
                }
            }
            
            useSkill(skill) {
                if (this.gameOver || this.skills[skill].cooldown > 0) return;
                
                this.skills[skill].cooldown = this.skills[skill].maxCooldown;
                
                switch(skill) {
                    case 'Q':
                        AudioSys.playExplosion();
                        for (let dy = -1; dy <= 1; dy++) {
                            for (let dx = -1; dx <= 1; dx++) {
                                let nx = Math.round(this.player.x) + dx;
                                let ny = Math.round(this.player.y) + dy;
                                this.createParticles(nx, ny, '#ff6600', 10);
                                
                                this.enemies.forEach(enemy => {
                                    if (Math.abs(enemy.x - nx) < 1.5 && Math.abs(enemy.y - ny) < 1.5) {
                                        enemy.health -= 50;
                                        this.createParticles(enemy.x, enemy.y, '#ff0000', 5);
                                    }
                                });
                            }
                        }
                        break;
                    case 'E':
                        this.player.shieldTime = 5;
                        AudioSys.playTone(440, 0.5, 'sine', 0.3);
                        break;
                    case 'R':
                        this.player.speedTime = 5;
                        AudioSys.playTone(880, 0.3, 'sine', 0.3);
                        break;
                }
                
                this.updateSkillUI();
            }
            
            isValidMove(x, y) {
                return x >= 0 && x < this.GRID_WIDTH && 
                       y >= 0 && y < this.GRID_HEIGHT && 
                       this.grid[y][x].state !== 'wall';
            }
            
            nextLevel() {
                this.level++;
                this.player.health = Math.min(this.player.maxHealth, this.player.health + 20);
                this.score += 500;
                AudioSys.playLevelUp();
                this.showStatus(`进入区域 ${this.level}！`, 'win');
                document.getElementById('level').textContent = `区域 ${this.level}`;
                this.generateLevel();
            }
            
            update(delta) {
                if (this.gameOver || this.paused) return;
                
                this.gameTime += delta;
                
                // 更新冷却
                if (this.player.dashCooldown > 0) this.player.dashCooldown -= delta;
                for (let key in this.skills) {
                    if (this.skills[key].cooldown > 0) {
                        this.skills[key].cooldown -= delta;
                        if (this.skills[key].cooldown < 0) this.skills[key].cooldown = 0;
                    }
                }
                
                // 玩家移动
                let moveInterval = this.player.speedTime > 0 ? 0.06 : 0.12;
                if (this.gameTime % moveInterval < delta) {
                    let dx = 0, dy = 0;
                    if (this.keys['w']) dy = -1;
                    if (this.keys['s']) dy = 1;
                    if (this.keys['a']) dx = -1;
                    if (this.keys['d']) dx = 1;
                    
                    if (dx !== 0 || dy !== 0) {
                        let nx = Math.round(this.player.x + dx);
                        let ny = Math.round(this.player.y + dy);
                        if (this.isValidMove(nx, ny)) {
                            this.player.x = nx;
                            this.player.y = ny;
                            this.claimCell(nx, ny);
                            
                            // 检查是否进入出口
                            if (this.exitOpen && nx === this.exitPos.x && ny === this.exitPos.y) {
                                this.nextLevel();
                                return;
                            }
                        }
                    }
                }
                
                // 更新buff时间
                if (this.player.shieldTime > 0) this.player.shieldTime -= delta;
                if (this.player.speedTime > 0) this.player.speedTime -= delta;
                
                // 更新敌人
                this.enemies.forEach((enemy, index) => {
                    const ex = Math.floor(enemy.x);
                    const ey = Math.floor(enemy.y);
                    if (ex >= 0 && ex < this.GRID_WIDTH && ey >= 0 && ey < this.GRID_HEIGHT) {
                        enemy.inDominion = this.grid[ey][ex].isDominion;
                    }
                    
                    if (enemy.inDominion) {
                        enemy.health -= (5 + this.level) * delta;
                    }
                    
                    // 敌人移动
                    let dx = this.player.x - enemy.x;
                    let dy = this.player.y - enemy.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist > 0.3) {
                        let speed = enemy.inDominion ? enemy.speed * 0.7 : enemy.speed;
                        if (enemy.type === 'fast') speed *= 1.5;
                        enemy.x += (dx / dist) * speed;
                        enemy.y += (dy / dist) * speed;
                    }
                    
                    // 碰撞检测
                    if (dist < 0.6 && this.player.shieldTime <= 0) {
                        this.player.health -= 15;
                        enemy.health = 0;
                        AudioSys.playHit();
                        this.createParticles(this.player.x, this.player.y, '#ff0000', 10);
                    }
                    
                    // 移除死亡敌人
                    if (enemy.health <= 0) {
                        this.createParticles(enemy.x, enemy.y, '#ff8800', 15);
                        this.enemies.splice(index, 1);
                        this.score += 50 + this.level * 10;
                    }
                });
                
                // 定期生成新敌人
                if (Math.floor(this.gameTime) % (25 - this.level) === 0 && Math.random() < 0.03) {
                    this.spawnEnemy();
                }
                
                // 检查游戏结束
                if (this.player.health <= 0) {
                    this.lose();
                }
                
                this.updateUI();
            }
            
            draw() {
                const ctx = this.ctx;
                ctx.fillStyle = '#080810';
                ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                const offsetX = 80;
                const offsetY = 40;
                
                // 绘制网格背景效果
                ctx.strokeStyle = 'rgba(0, 255, 136, 0.05)';
                ctx.lineWidth = 1;
                for (let i = 0; i < this.canvas.width; i += 20) {
                    ctx.beginPath();
                    ctx.moveTo(i, 0);
                    ctx.lineTo(i, this.canvas.height);
                    ctx.stroke();
                }
                for (let i = 0; i < this.canvas.height; i += 20) {
                    ctx.beginPath();
                    ctx.moveTo(0, i);
                    ctx.lineTo(this.canvas.width, i);
                    ctx.stroke();
                }
                
                // 绘制网格
                for (let y = 0; y < this.GRID_HEIGHT; y++) {
                    for (let x = 0; x < this.GRID_WIDTH; x++) {
                        let cell = this.grid[y][x];
                        let px = x * this.CELL_SIZE + offsetX;
                        let py = y * this.CELL_SIZE + offsetY;
                        
                        if (cell.state === 'wall') {
                            ctx.fillStyle = '#1a1a2e';
                            ctx.fillRect(px, py, this.CELL_SIZE - 2, this.CELL_SIZE - 2);
                            ctx.strokeStyle = '#2a2a4e';
                            ctx.strokeRect(px, py, this.CELL_SIZE - 2, this.CELL_SIZE - 2);
                        } else if (cell.isDominion) {
                            // 领地渐变效果
                            const gradient = ctx.createRadialGradient(
                                px + this.CELL_SIZE/2, py + this.CELL_SIZE/2, 0,
                                px + this.CELL_SIZE/2, py + this.CELL_SIZE/2, this.CELL_SIZE
                            );
                            gradient.addColorStop(0, 'rgba(0, 255, 136, 0.4)');
                            gradient.addColorStop(1, 'rgba(0, 255, 136, 0.1)');
                            ctx.fillStyle = gradient;
                            ctx.fillRect(px, py, this.CELL_SIZE - 2, this.CELL_SIZE - 2);
                            
                            ctx.strokeStyle = '#00ff88';
                            ctx.lineWidth = 1;
                            ctx.strokeRect(px, py, this.CELL_SIZE - 2, this.CELL_SIZE - 2);
                            
                            // 代码雨效果
                            if (Math.random() > 0.95) {
                                ctx.fillStyle = 'rgba(0, 255, 136, 0.5)';
                                ctx.font = '10px monospace';
                                ctx.fillText(Math.random() > 0.5 ? '1' : '0', px + 5, py + 15);
                            }
                        } else {
                            ctx.fillStyle = '#0f0f1a';
                            ctx.fillRect(px, py, this.CELL_SIZE - 2, this.CELL_SIZE - 2);
                            ctx.strokeStyle = '#1a1a3e';
                            ctx.lineWidth = 1;
                            ctx.strokeRect(px, py, this.CELL_SIZE - 2, this.CELL_SIZE - 2);
                        }
                    }
                }
                
                // 绘制出口
                if (this.exitOpen) {
                    const px = this.exitPos.x * this.CELL_SIZE + offsetX;
                    const py = this.exitPos.y * this.CELL_SIZE + offsetY;
                    
                    // 传送门动画
                    const pulse = Math.sin(Date.now() / 200) * 0.3 + 0.7;
                    const gradient = ctx.createRadialGradient(
                        px + this.CELL_SIZE/2, py + this.CELL_SIZE/2, 0,
                        px + this.CELL_SIZE/2, py + this.CELL_SIZE/2, this.CELL_SIZE * 0.8
                    );
                    gradient.addColorStop(0, `rgba(0, 255, 0, ${pulse})`);
                    gradient.addColorStop(1, 'rgba(0, 255, 0, 0)');
                    ctx.fillStyle = gradient;
                    ctx.fillRect(px - 10, py - 10, this.CELL_SIZE + 20, this.CELL_SIZE + 20);
                    
                    ctx.fillStyle = '#00ff00';
                    ctx.font = 'bold 24px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('🚪', px + this.CELL_SIZE/2, py + this.CELL_SIZE/2 + 8);
                    ctx.textAlign = 'left';
                }
                
                // 绘制敌人
                this.enemies.forEach(enemy => {
                    const px = enemy.x * this.CELL_SIZE + offsetX + this.CELL_SIZE / 2;
                    const py = enemy.y * this.CELL_SIZE + offsetY + this.CELL_SIZE / 2;
                    
                    // 敌人发光效果
                    if (enemy.inDominion) {
                        ctx.shadowColor = '#ff4444';
                        ctx.shadowBlur = 15;
                    }
                    
                    ctx.fillStyle = enemy.type === 'fast' ? '#ff8844' : '#ff4444';
                    ctx.beginPath();
                    ctx.moveTo(px, py - 14);
                    ctx.lineTo(px + 14, py + 10);
                    ctx.lineTo(px - 14, py + 10);
                    ctx.closePath();
                    ctx.fill();
                    
                    ctx.shadowBlur = 0;
                    
                    // 血条
                    const barWidth = 28;
                    const barHeight = 4;
                    ctx.fillStyle = '#000';
                    ctx.fillRect(px - barWidth/2, py - 22, barWidth, barHeight);
                    ctx.fillStyle = enemy.health > enemy.maxHealth * 0.5 ? '#00ff88' : '#ff4444';
                    ctx.fillRect(px - barWidth/2, py - 22, barWidth * (enemy.health / enemy.maxHealth), barHeight);
                });
                
                // 绘制玩家
                const px = this.player.x * this.CELL_SIZE + offsetX + this.CELL_SIZE / 2;
                const py = this.player.y * this.CELL_SIZE + offsetY + this.CELL_SIZE / 2;
                
                // 护盾效果
                if (this.player.shieldTime > 0) {
                    ctx.strokeStyle = '#00ffff';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(px, py, 22, 0, Math.PI * 2);
                    ctx.stroke();
                    
                    ctx.fillStyle = 'rgba(0, 255, 255, 0.2)';
                    ctx.fill();
                }
                
                // 加速效果
                if (this.player.speedTime > 0) {
                    ctx.fillStyle = 'rgba(255, 255, 0, 0.3)';
                    ctx.beginPath();
                    ctx.arc(px, py, 18, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // 冲刺冷却指示
                if (this.player.dashCooldown > 0) {
                    ctx.strokeStyle = '#444';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(px, py, 25, 0, Math.PI * 2 * (1 - this.player.dashCooldown / 3));
                    ctx.stroke();
                }
                
                // 玩家主体
                ctx.fillStyle = '#00ff88';
                ctx.shadowColor = '#00ff88';
                ctx.shadowBlur = 20;
                ctx.beginPath();
                ctx.moveTo(px, py - 16);
                ctx.lineTo(px + 14, py + 12);
                ctx.lineTo(px - 14, py + 12);
                ctx.closePath();
                ctx.fill();
                ctx.shadowBlur = 0;
                
                // 绘制粒子
                this.particles.forEach((p, i) => {
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.life;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                    
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.1; // 重力
                    p.life -= 0.02;
                    
                    if (p.life <= 0) {
                        this.particles.splice(i, 1);
                    }
                });
            }
            
            updateUI() {
                document.getElementById('health').textContent = Math.max(0, Math.floor(this.player.health));
                document.getElementById('dominion').textContent = this.dominionPercent + '%';
                document.getElementById('score').textContent = this.score;
                
                let minutes = Math.floor(this.gameTime / 60);
                let seconds = Math.floor(this.gameTime % 60);
                document.getElementById('time').textContent = 
                    minutes.toString().padStart(2, '0') + ':' + seconds.toString().padStart(2, '0');
                
                this.updateSkillUI();
            }
            
            updateSkillUI() {
                for (let key in this.skills) {
                    let el = document.getElementById('skill' + key);
                    if (this.skills[key].cooldown <= 0) {
                        el.classList.add('ready');
                        el.style.opacity = '1';
                    } else {
                        el.classList.remove('ready');
                        el.style.opacity = '0.4';
                    }
                }
            }
            
            showStatus(msg, type = '') {
                const status = document.getElementById('status');
                status.textContent = msg;
                status.className = 'status-message' + (type ? ' ' + type : '');
            }
            
            lose() {
                this.gameOver = true;
                AudioSys.playTone(150, 1, 'sawtooth', 0.5);
                this.showStatus('💀 进程被终止... 按重新开始再次尝试', 'lose');
            }
            
            restart() {
                this.level = 1;
                document.getElementById('level').textContent = '区域 1';
                this.resetGame();
                this.showStatus('点击格子开始占领领地！占领80%生成出口');
            }
            
            togglePause() {
                this.paused = !this.paused;
                if (this.paused) {
                    this.showStatus('⏸️ 游戏暂停');
                } else {
                    this.showStatus('▶️ 游戏继续');
                }
            }
            
            loop(timestamp) {
                let delta = (timestamp - this.lastTime) / 1000;
                this.lastTime = timestamp;
                
                if (delta > 0.1) delta = 0.1;
                
                this.update(delta);
                this.draw();
                
                requestAnimationFrame((t) => this.loop(t));
            }
        }
        
        // 启动游戏
        const game = new Game();
    </script>
</body>
</html>
