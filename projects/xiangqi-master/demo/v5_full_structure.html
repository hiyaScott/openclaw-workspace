<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>象棋大师 - 完整四层结构</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: #F5F5F5;
            min-height: 100vh;
        }
        
        .screen {
            display: none;
            min-height: 100vh;
        }
        
        .screen.active {
            display: block;
        }
        
        /* ===== 第一层：章 ===== */
        .chapter-header {
            background: white;
            padding: 20px 16px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .chapter-header-title {
            font-size: 22px;
            font-weight: 700;
            color: #333;
        }
        
        .chapter-header-subtitle {
            font-size: 14px;
            color: #666;
            margin-top: 6px;
        }
        
        .chapter-list {
            padding: 16px;
        }
        
        .chapter-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .chapter-card:active {
            transform: scale(0.98);
        }
        
        .chapter-card.locked {
            opacity: 0.6;
        }
        
        .chapter-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .chapter-card-name {
            font-size: 16px;
            font-weight: 700;
            color: #333;
        }
        
        .chapter-card-status {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 600;
        }
        
        .chapter-card-status.completed { background: #E8F5E9; color: #4CAF50; }
        .chapter-card-status.current { background: #E3F2FD; color: #2196F3; }
        .chapter-card-status.locked { background: #F5F5F5; color: #999; }
        
        .chapter-card-progress {
            height: 8px;
            background: #E0E0E0;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 6px;
        }
        
        .chapter-card-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
            border-radius: 4px;
            transition: width 0.3s;
        }
        
        .chapter-card-info {
            font-size: 12px;
            color: #888;
        }
        
        /* ===== 第二层：主题 ===== */
        .nav-bar {
            background: white;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .nav-back {
            font-size: 20px;
            color: #666;
            cursor: pointer;
            padding: 4px;
        }
        
        .nav-title {
            font-size: 17px;
            font-weight: 700;
            color: #333;
        }
        
        .topic-grid {
            padding: 16px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .topic-item {
            background: white;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        
        .topic-item:active {
            transform: scale(0.96);
        }
        
        .topic-item.locked {
            opacity: 0.5;
        }
        
        .topic-item-number {
            font-size: 12px;
            color: #999;
            margin-bottom: 4px;
        }
        
        .topic-item-name {
            font-size: 15px;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
            line-height: 1.3;
        }
        
        .topic-item-progress {
            height: 6px;
            background: #E0E0E0;
            border-radius: 3px;
            overflow: hidden;
        }
        
        .topic-item-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
            border-radius: 3px;
        }
        
        .topic-item-status {
            position: absolute;
            top: 12px;
            right: 12px;
            font-size: 16px;
        }
        
        /* ===== 第三层：关 ===== */
        .level-path-container {
            padding: 20px;
            min-height: calc(100vh - 60px);
            background: linear-gradient(180deg, #F5F5F5 0%, #E8EAF6 100%);
        }
        
        .level-path-title {
            font-size: 18px;
            font-weight: 700;
            color: #333;
            margin-bottom: 4px;
        }
        
        .level-path-subtitle {
            font-size: 13px;
            color: #666;
            margin-bottom: 24px;
        }
        
        .level-nodes {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        
        .level-node-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        
        .level-connector {
            width: 4px;
            height: 20px;
            background: #E0E0E0;
            border-radius: 2px;
        }
        
        .level-connector.completed {
            background: linear-gradient(180deg, #4CAF50, #8BC34A);
        }
        
        .level-node {
            width: 68px;
            height: 68px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .level-node.completed {
            background: linear-gradient(135deg, #4CAF50, #8BC34A);
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
        }
        
        .level-node.current {
            background: linear-gradient(135deg, #2196F3, #42A5F5);
            box-shadow: 0 4px 16px rgba(33, 150, 243, 0.35);
            animation: nodePulse 1.5s infinite;
        }
        
        .level-node.locked {
            background: #E0E0E0;
            opacity: 0.6;
        }
        
        .level-node.chest {
            background: linear-gradient(135deg, #FFD700, #FFA000);
            box-shadow: 0 4px 12px rgba(255, 193, 7, 0.4);
        }
        
        @keyframes nodePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }
        
        .level-node-icon {
            font-size: 26px;
        }
        
        .level-node-label {
            font-size: 10px;
            color: white;
            font-weight: 600;
            margin-top: 2px;
        }
        
        /* ===== 第四层：局 ===== */
        .game-screen {
            background: white;
            min-height: 100vh;
            padding-bottom: 80px;
        }
        
        .game-top-bar {
            background: white;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .game-breadcrumb {
            font-size: 12px;
            color: #666;
        }
        
        .game-streak {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 14px;
            font-weight: 600;
            color: #FF6B35;
        }
        
        .ju-progress-area {
            padding: 16px;
            background: white;
            border-bottom: 1px solid #eee;
        }
        
        .ju-progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        
        .ju-progress-label {
            font-size: 14px;
            color: #666;
        }
        
        .ju-progress-number {
            font-size: 14px;
            font-weight: 700;
            color: #333;
        }
        
        .ju-progress-track {
            height: 10px;
            background: #E0E0E0;
            border-radius: 5px;
            overflow: hidden;
        }
        
        .ju-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
            border-radius: 5px;
            transition: width 0.3s;
        }
        
        .game-info-card {
            padding: 20px;
            text-align: center;
            background: white;
        }
        
        .game-tag {
            display: inline-block;
            background: #E3F2FD;
            color: #2196F3;
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        
        .game-level-name {
            font-size: 22px;
            font-weight: 700;
            color: #333;
            margin-bottom: 6px;
        }
        
        .game-level-desc {
            font-size: 14px;
            color: #666;
        }
        
        /* Max */
        .max-box {
            display: flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, #E3F2FD, #BBDEFB);
            border-radius: 16px;
            padding: 14px;
            margin: 12px 16px;
        }
        
        .max-face {
            width: 48px;
            height: 48px;
            background: white;
            border-radius: 50%;
            border: 3px solid #2196F3;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .max-eyes {
            display: flex;
            gap: 3px;
        }
        
        .max-eye {
            width: 4px;
            height: 8px;
            background: #333;
            border-radius: 50%;
        }
        
        .max-bubble {
            background: white;
            border-radius: 12px;
            padding: 10px 14px;
            position: relative;
            flex: 1;
        }
        
        .max-bubble::before {
            content: '';
            position: absolute;
            left: -8px;
            top: 50%;
            transform: translateY(-50%);
            border: 8px solid transparent;
            border-right-color: white;
        }
        
        .max-message {
            font-size: 14px;
            color: #333;
            line-height: 1.4;
        }
        
        /* 棋盘 */
        .chess-board-wrapper {
            background: linear-gradient(135deg, #D4A574, #C49A6C);
            padding: 10px;
            margin: 12px 16px;
            border-radius: 12px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.12);
        }
        
        .chess-board {
            position: relative;
            width: 100%;
            aspect-ratio: 1/1.125;
            background: #E8C9A0;
        }
        
        .board-frame {
            position: absolute;
            inset: 0;
            border: 2px solid #8B6914;
        }
        
        .board-grids {
            position: absolute;
            inset: 0;
        }
        
        .grid-h {
            position: absolute;
            left: 0;
            right: 0;
            height: 1px;
            background: #8B6914;
        }
        
        .grid-v {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 1px;
            background: #8B6914;
        }
        
        .palace-area {
            position: absolute;
            left: 37.5%;
            width: 25%;
            height: 22.22%;
            border: 1px solid #8B6914;
        }
        
        .palace-top { top: 0; }
        .palace-bottom { bottom: 0; }
        
        .palace-area::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(45deg, transparent 49.5%, #8B6914 49.5%, #8B6914 50.5%, transparent 50.5%),
                        linear-gradient(-45deg, transparent 49.5%, #8B6914 49.5%, #8B6914 50.5%, transparent 50.5%);
        }
        
        .river {
            position: absolute;
            left: 0;
            right: 0;
            top: 44.44%;
            height: 11.11%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .river span {
            font-size: 16px;
            color: #8B6914;
            font-weight: bold;
            letter-spacing: 8px;
        }
        
        .pieces-container {
            position: absolute;
            inset: 0;
        }
        
        .chess-piece {
            position: absolute;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            transform: translate(-50%, -50%);
            box-shadow: 0 3px 12px rgba(0,0,0,0.35), inset 0 2px 4px rgba(255,255,255,0.4);
            z-index: 10;
        }
        
        .chess-piece.selected {
            box-shadow: 0 0 0 4px #2196F3, 0 3px 12px rgba(0,0,0,0.35);
        }
        
        .piece-red {
            background: linear-gradient(135deg, #D32F2F, #B71C1C);
            color: white;
            border: 2px solid #FFCDD2;
        }
        
        .piece-black {
            background: linear-gradient(135deg, #424242, #212121);
            color: white;
            border: 2px solid #BDBDBD;
        }
        
        .piece-target {
            background: rgba(76, 175, 80, 0.25);
            border: 2px dashed #4CAF50;
        }
        
        .move-indicator {
            position: absolute;
            width: 12px;
            height: 12px;
            background: radial-gradient(circle, #4CAF50, #2E7D32);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            animation: indicatorPulse 1.2s infinite;
            z-index: 5;
        }
        
        @keyframes indicatorPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.85; }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.4; }
        }
        
        /* 底部操作 */
        .game-actions {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-between;
            padding: 12px 16px;
            box-shadow: 0 -2px 12px rgba(0,0,0,0.08);
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
        }
        
        .game-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 12px 20px;
            border-radius: 24px;
            border: none;
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .btn-gray {
            background: #F5F5F5;
            color: #666;
        }
        
        .btn-blue {
            background: linear-gradient(135deg, #2196F3, #1976D2);
            color: white;
        }
        
        /* 弹窗 */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        
        .modal-overlay.show {
            display: flex;
        }
        
        .modal-box {
            background: white;
            border-radius: 24px;
            padding: 28px 24px;
            text-align: center;
            max-width: 320px;
            width: 90%;
        }
        
        .modal-emoji {
            font-size: 56px;
            margin-bottom: 12px;
        }
        
        .modal-heading {
            font-size: 22px;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
        }
        
        .modal-desc {
            font-size: 14px;
            color: #666;
            margin-bottom: 16px;
        }
        
        .modal-btn {
            background: linear-gradient(135deg, #4CAF50, #388E3C);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 24px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
        }
        
        /* 宝箱弹窗 */
        .chest-popup .modal-box {
            background: linear-gradient(135deg, #FFD700, #FFA000);
        }
        
        .reward-box {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin: 16px 0;
        }
        
        .reward-line {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 18px;
            font-weight: 700;
            color: #333;
        }
        
        /* ===== 关卡结算界面（多邻国风格） ===== */
        .level-complete-screen {
            display: none;
            position: fixed;
            inset: 0;
            background: white;
            z-index: 200;
            flex-direction: column;
            align-items: center;
            padding: 40px 24px;
        }
        
        .level-complete-screen.show {
            display: flex;
        }
        
        .complete-mascot {
            width: 180px;
            height: 180px;
            margin-bottom: 20px;
            animation: mascotBounce 1s ease infinite alternate;
        }
        
        @keyframes mascotBounce {
            0% { transform: translateY(0) rotate(-3deg); }
            100% { transform: translateY(-10px) rotate(3deg); }
        }
        
        .complete-mascot svg {
            width: 100%;
            height: 100%;
        }
        
        .complete-title {
            font-size: 28px;
            font-weight: 800;
            color: #FFC107;
            margin-bottom: 8px;
        }
        
        .complete-subtitle {
            font-size: 16px;
            color: #666;
            margin-bottom: 32px;
        }
        
        .stats-row {
            display: flex;
            gap: 12px;
            width: 100%;
            max-width: 360px;
            margin-bottom: 32px;
        }
        
        .stat-card {
            flex: 1;
            background: white;
            border-radius: 16px;
            padding: 16px 8px;
            text-align: center;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            border: 2px solid transparent;
        }
        
        .stat-card.xp {
            border-color: #FFC107;
        }
        
        .stat-card.accuracy {
            border-color: #4CAF50;
        }
        
        .stat-card.speed {
            border-color: #2196F3;
        }
        
        .stat-card-header {
            font-size: 11px;
            color: #999;
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .stat-card-icon {
            font-size: 28px;
            margin-bottom: 4px;
        }
        
        .stat-card-value {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 2px;
        }
        
        .stat-card.xp .stat-card-value { color: #FFC107; }
        .stat-card.accuracy .stat-card-value { color: #4CAF50; }
        .stat-card.speed .stat-card-value { color: #2196F3; }
        
        .stat-card-label {
            font-size: 11px;
            color: #999;
            font-weight: 600;
        }
        
        .complete-btn {
            width: 100%;
            max-width: 360px;
            background: linear-gradient(135deg, #2196F3, #1976D2);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 16px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(33, 150, 243, 0.3);
        }
        
        .shake {
            animation: shakeAnim 0.4s ease;
        }
        
        @keyframes shakeAnim {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
    </style>
</head>
<body>
    <!-- 第一层：章 -->
    <div class="screen active" id="chapterScreen">
        <div class="chapter-header">
            <div class="chapter-header-title">象棋大师</div>
            <div class="chapter-header-subtitle">选择章节开始学习</div>
        </div>
        
        <div class="chapter-list" id="chapterList"></div>
    </div>
    
    <!-- 第二层：主题 -->
    <div class="screen" id="topicScreen">
        <div class="nav-bar">
            <span class="nav-back" onclick="backToChapters()">←</span>
            <span class="nav-title" id="topicNavTitle">第一章</span>
        </div>
        
        <div class="topic-grid" id="topicGrid"></div>
    </div>
    
    <!-- 第三层：关 -->
    <div class="screen" id="levelScreen">
        <div class="nav-bar">
            <span class="nav-back" onclick="backToTopics()">←</span>
            <span class="nav-title" id="levelNavTitle">棋子移动</span>
        </div>
        
        <div class="level-path-container">
            <div class="level-path-title" id="levelPathTitle"></div>
            <div class="level-path-subtitle">共9关，学习所有棋子移动</div>
            
            <div class="level-nodes" id="levelNodes"></div>
        </div>
    </div>
    
    <!-- 第四层：局 -->
    <div class="screen game-screen" id="gameScreen">
        <div class="game-top-bar">
            <div class="game-breadcrumb" id="gameBreadcrumb">第一章 · 棋子移动 · 移动马</div>
            <div class="game-streak">
                <span>🔥</span>
                <span id="streakNumber">3</span>
            </div>
        </div>
        
        <div class="ju-progress-area">
            <div class="ju-progress-header">
                <span class="ju-progress-label">本关进度</span>
                <span class="ju-progress-number"><span id="currentJuNum">1</span> / <span id="totalJuNum">10</span> 局</span>
            </div>
            <div class="ju-progress-track">
                <div class="ju-progress-fill" id="juProgressBar" style="width: 10%"></div>
            </div>
        </div>
        
        <div class="game-info-card">
            <div class="game-tag" id="juTypeTag">📚 教学</div>
            <div class="game-level-name" id="juTitle">基础走法</div>
            <div class="game-level-desc" id="juSubtitle">学习马的基本走法</div>
        </div>
        
        <div class="max-box">
            <div class="max-face">
                <div class="max-eyes">
                    <div class="max-eye"></div>
                    <div class="max-eye"></div>
                </div>
            </div>
            <div class="max-bubble">
                <div class="max-message" id="maxMsg">马走"日"字——先横或竖走一格，再斜走一格。点击马开始练习！</div>
            </div>
        </div>
        
        <div class="chess-board-wrapper">
            <div class="chess-board" id="chessBoard">
                <div class="board-frame"></div>
                <div class="board-grids" id="boardGrids"></div>
                <div class="palace-area palace-top"></div>
                <div class="palace-area palace-bottom"></div>
                <div class="river"><span>楚 河 汉 界</span></div>
                <div class="pieces-container" id="piecesContainer"></div>
            </div>
        </div>
        
        <div class="game-actions">
            <button class="game-btn btn-gray" onclick="resetBoard()">
                <span>↩️</span>
                <span>重置</span>
            </button>

        // 状态
        let currentChapter = null;
        let currentTopic = null;
        let currentLevel = null;

        let selectedPiece = null;
        let validMoves = [];
        let levelStartTime = null;
        
        // ===== 初始化 =====
        function init() {
            renderChapters();
        }
        
        // ===== 第一层：章 =====
        function renderChapters() {
            const container = document.getElementById('chapterList');
            container.innerHTML = '';
            
            gameData.chapters.forEach((chapter, index) => {
                const card = document.createElement('div');
                card.className = `chapter-card ${chapter.locked ? 'locked' : ''}`;
                
                const statusClass = chapter.locked ? 'locked' : (index === 0 ? 'current' : 'completed');
                const statusText = chapter.locked ? '🔒 锁定' : (index === 0 ? '▶ 进行中' : '✓ 已完成');
                
                card.innerHTML = `
                    <div class="chapter-card-header">
                        <span class="chapter-card-name">${chapter.name}</span>
                        <span class="chapter-card-status ${statusClass}">${statusText}</span>
                    </div>
                    <div class="chapter-card-progress">
                        <div class="chapter-card-progress-fill" style="width: ${chapter.progress}%"></div>
                    </div>
                    <div class="chapter-card-info">${chapter.subtitle} · ${chapter.themeCount}个主题</div>
                `;
                
                if (!chapter.locked) {
                    card.onclick = () => enterChapter(chapter);
                }
                
                container.appendChild(card);
            });
        }
        
        function enterChapter(chapter) {
            currentChapter = chapter;
            document.getElementById('chapterScreen').classList.remove('active');
            document.getElementById('topicScreen').classList.add('active');
            document.getElementById('topicNavTitle').textContent = chapter.name.split('：')[0];
            renderTopics();
        }
        
        function backToChapters() {
            document.getElementById('topicScreen').classList.remove('active');
            document.getElementById('chapterScreen').classList.add('active');
        }
        
        // ===== 第二层：主题 =====
        function renderTopics() {
            const container = document.getElementById('topicGrid');
            container.innerHTML = '';
            
            currentChapter.themes.forEach((topic, index) => {
                const item = document.createElement('div');
                item.className = `topic-item ${topic.locked ? 'locked' : ''}`;
                
                const statusIcon = topic.locked ? '🔒' : (topic.progress > 0 ? '✓' : '▶');
                
                item.innerHTML = `
                    <div class="topic-item-status">${statusIcon}</div>
                    <div class="topic-item-number">主题 ${index + 1}</div>
                    <div class="topic-item-name">${topic.name}</div>
                    <div class="topic-item-progress">
                        <div class="topic-item-progress-fill" style="width: ${topic.progress}%"></div>
                    </div>
                `;
                
                if (!topic.locked) {
                    item.onclick = () => enterTopic(topic);
                }
                
                container.appendChild(item);
            });
        }
        
        function enterTopic(topic) {
            currentTopic = topic;
            document.getElementById('topicScreen').classList.remove('active');
            document.getElementById('levelScreen').classList.add('active');
            document.getElementById('levelNavTitle').textContent = topic.name;
            document.getElementById('levelPathTitle').textContent = `${currentChapter.name} · ${topic.name}`;
            renderLevels();
        }
        
        function backToTopics() {
            document.getElementById('levelScreen').classList.remove('active');
            document.getElementById('topicScreen').classList.add('active');
        }
        
        // ===== 第三层：关 =====
        function renderLevels() {
            const container = document.getElementById('levelNodes');
            container.innerHTML = '';
            
            theme1Levels.forEach((level, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'level-node-wrapper';
                
                if (index > 0) {
                    const line = document.createElement('div');
                    line.className = 'level-connector';
                    wrapper.appendChild(line);
                }
                
                const node = document.createElement('div');
                node.className = 'level-node';
                
                if (level.type === 'chest') {
                    node.classList.add('chest');
                } else if (index === 0) {
                    node.classList.add('current');
                } else {
                    node.classList.add('locked');
                }
                
                node.innerHTML = `
                    <span class="level-node-icon">${level.icon}</span>
                    ${level.type !== 'chest' ? `<span class="level-node-label">${level.name}</span>` : ''}
                `;
                
                node.onclick = () => enterLevel(level);
                wrapper.appendChild(node);
                container.appendChild(wrapper);
            });
        }
        
        function enterLevel(level) {
            if (level.type === 'chest') {
                document.getElementById('chestModal').classList.add('show');
                return;
            }
            
            currentLevel = level;
            currentJuIndex = 0;
            levelStartTime = Date.now();
            
            document.getElementById('levelScreen').classList.remove('active');
            document.getElementById('gameScreen').classList.add('active');
            
            document.getElementById('gameBreadcrumb').textContent = 
                `第一章 · ${currentTopic.name} · ${level.name}`;
            document.getElementById('totalJuNum').textContent = level.juCount;
            
            renderJu();
        }

            const ju = maLevelJus[currentJuIndex];
            
            document.getElementById('currentJuNum').textContent = currentJuIndex + 1;

            const typeLabels = { '教学': '📚 教学', '练习': '✏️ 练习', '巩固': '💪 巩固', '考试': '📝 考试' };
            document.getElementById('juTypeTag').textContent = typeLabels[ju.type];
            document.getElementById('juTitle').textContent = ju.name;
            document.getElementById('juSubtitle').textContent = ju.desc;
            document.getElementById('maxMsg').textContent = ju.maxText;
            
            renderBoard();
            renderPieces(ju);
        }
        
        function renderBoard() {
            const grids = document.getElementById('boardGrids');
            grids.innerHTML = '';
            
            for (let i = 0; i <= 9; i++) {
                const line = document.createElement('div');
                line.className = 'grid-h';
                line.style.top = (i * 11.11) + '%';
                grids.appendChild(line);
            }
            
            for (let i = 0; i <= 8; i++) {
                const line1 = document.createElement('div');
                line1.className = 'grid-v';
                line1.style.left = (i * 12.5) + '%';
                line1.style.top = '0';
                line1.style.height = '44.44%';
                grids.appendChild(line1);
                
                const line2 = document.createElement('div');
                line2.className = 'grid-v';
                line2.style.left = (i * 12.5) + '%';
                line2.style.top = '55.55%';
                line2.style.height = '44.45%';
                grids.appendChild(line2);
            }
        }
        
        function renderPieces(ju) {
            const container = document.getElementById('piecesContainer');
            container.innerHTML = '';
            
            // 马
            const horse = document.createElement('div');
            horse.className = 'chess-piece piece-red';
            horse.textContent = '馬';
            horse.style.left = (ju.setup.horse.x * 12.5) + '%';
            horse.style.top = (ju.setup.horse.y * 11.11) + '%';
            horse.onclick = (e) => selectHorse(e, ju.setup.horse.x, ju.setup.horse.y);
            container.appendChild(horse);
            
            // 目标
            if (ju.setup.targets) {
                ju.setup.targets.forEach(target => {
                    const t = document.createElement('div');
                    t.className = 'chess-piece piece-target';
                    t.style.left = (target.x * 12.5) + '%';
                    t.style.top = (target.y * 11.11) + '%';
                    t.onclick = () => moveToTarget(target);
                    container.appendChild(t);
                });
            }
            
            // 其他棋子
            if (ju.setup.otherPieces) {
                ju.setup.otherPieces.forEach(p => {
                    const piece = document.createElement('div');
                    piece.className = 'chess-piece piece-black';
                    piece.textContent = p.piece;
                    piece.style.left = (p.x * 12.5) + '%';
                    piece.style.top = (p.y * 11.11) + '%';
                    container.appendChild(piece);
                });
            }
        }
        
        function selectHorse(e, x, y) {
            e.stopPropagation();
            document.querySelectorAll('.chess-piece').forEach(p => p.classList.remove('selected'));
            document.querySelectorAll('.move-indicator').forEach(m => m.remove());
            
            const piece = e.target;
            piece.classList.add('selected');
            selectedPiece = { x, y, element: piece };
            
            // 计算马的所有走法
            validMoves = calculateHorseMoves(x, y);
            showMoveIndicators(validMoves);
        }
        
        function calculateHorseMoves(x, y) {
            const moves = [];
            const directions = [
                { dx: 1, dy: 2, blockX: 0, blockY: 1 },
                { dx: 2, dy: 1, blockX: 1, blockY: 0 },
                { dx: 2, dy: -1, blockX: 1, blockY: 0 },
                { dx: 1, dy: -2, blockX: 0, blockY: -1 },
                { dx: -1, dy: -2, blockX: 0, blockY: -1 },
                { dx: -2, dy: -1, blockX: -1, blockY: 0 },
                { dx: -2, dy: 1, blockX: -1, blockY: 0 },
                { dx: -1, dy: 2, blockX: 0, blockY: 1 }
            ];
            
            directions.forEach(dir => {
                const newX = x + dir.dx;
                const newY = y + dir.dy;
                
                if (newX >= 0 && newX <= 8 && newY >= 0 && newY <= 9) {
                    moves.push({ x: newX, y: newY });
                }
            });
            
            return moves;
        }
        
        function showMoveIndicators(moves) {
            const container = document.getElementById('piecesContainer');
            moves.forEach(move => {
                const indicator = document.createElement('div');
                indicator.className = 'move-indicator';
                indicator.style.left = (move.x * 12.5) + '%';
                indicator.style.top = (move.y * 11.11) + '%';
                container.appendChild(indicator);
            });
        }
        
        function moveToTarget(target) {
            if (!selectedPiece) return;
            
            const isValid = validMoves.some(m => m.x === target.x && m.y === target.y);
            
            if (!isValid) {
                document.querySelector('.chess-board-wrapper').classList.add('shake');
                setTimeout(() => {
                    document.querySelector('.chess-board-wrapper').classList.remove('shake');
                }, 400);
                return;
            }
            
            selectedPiece.element.style.left = (target.x * 12.5) + '%';
            selectedPiece.element.style.top = (target.y * 11.11) + '%';
            
            document.querySelectorAll('.chess-piece').forEach(p => p.classList.remove('selected'));
            document.querySelectorAll('.move-indicator').forEach(m => m.remove());
            
            setTimeout(() => {
                document.getElementById('juSuccessText').textContent = `第${currentJuIndex + 1}局完成！`;
                document.getElementById('juSuccessModal').classList.add('show');
            }, 300);
        }
        
        function nextJu() {
            document.getElementById('juSuccessModal').classList.remove('show');
            
            if (currentJuIndex + 1 < currentLevel.juCount) {
                currentJuIndex++;
                renderJu();
            } else {
                // 关完成，显示结算
                showLevelComplete();
            }
        }
        
        function showLevelComplete() {
            const elapsed = Math.floor((Date.now() - levelStartTime) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            const timeStr = `${minutes}:${seconds.toString().padStart(2, '0')}`;
            
            document.querySelector('.stat-card.speed .stat-card-value').textContent = timeStr;
            document.getElementById('levelCompleteScreen').classList.add('show');
        }
        
        function finishLevel() {
            document.getElementById('levelCompleteScreen').classList.remove('show');
            document.getElementById('gameScreen').classList.remove('active');
            document.getElementById('levelScreen').classList.add('active');
        }
        
        function closeChest() {
            document.getElementById('chestModal').classList.remove('show');
        }
        
        function resetBoard() {
            selectedPiece = null;
            validMoves = [];
            document.querySelectorAll('.chess-piece').forEach(p => p.classList.remove('selected'));
            document.querySelectorAll('.move-indicator').forEach(m => m.remove());
            renderJu();
        }
        
        function showHint() {
            document.getElementById('maxMsg').textContent = '提示：马走日字，先直走一格再斜走一格，注意不要被蹩马腿！';
        }
        
        // 初始化
        init();
    </script>
</body>
</html>
