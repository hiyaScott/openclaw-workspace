<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>象棋大师 - 移动马（10局完整版）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: #F5F5F5;
            min-height: 100vh;
        }
        
        /* ===== 游戏界面 ===== */
        .game-screen {
            background: white;
            min-height: 100vh;
            padding-bottom: 80px;
        }
        
        .game-header {
            background: white;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .breadcrumb {
            font-size: 12px;
            color: #666;
        }
        
        .streak-display {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 14px;
            font-weight: 600;
            color: #FF6B35;
        }
        
        .ju-progress-section {
            padding: 16px;
            background: white;
            border-bottom: 1px solid #eee;
        }
        
        .ju-progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        
        .ju-progress-title {
            font-size: 14px;
            color: #666;
        }
        
        .ju-progress-count {
            font-size: 14px;
            font-weight: 700;
            color: #333;
        }
        
        .ju-progress-bar {
            height: 10px;
            background: #E0E0E0;
            border-radius: 5px;
            overflow: hidden;
        }
        
        .ju-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
            border-radius: 5px;
            transition: width 0.3s;
        }
        
        .level-info-card {
            padding: 20px;
            text-align: center;
            background: white;
        }
        
        .level-tag {
            display: inline-block;
            background: #E3F2FD;
            color: #2196F3;
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        
        .level-name {
            font-size: 22px;
            font-weight: 700;
            color: #333;
            margin-bottom: 6px;
        }
        
        .level-desc {
            font-size: 14px;
            color: #666;
        }
        
        /* Max助手 */
        .max-container {
            display: flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, #E3F2FD, #BBDEFB);
            border-radius: 16px;
            padding: 14px;
            margin: 12px 16px;
        }
        
        .max-avatar {
            width: 48px;
            height: 48px;
            background: white;
            border-radius: 50%;
            border: 3px solid #2196F3;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .max-eyes {
            display: flex;
            gap: 3px;
        }
        
        .max-eye {
            width: 4px;
            height: 8px;
            background: #333;
            border-radius: 50%;
        }
        
        .max-speech {
            background: white;
            border-radius: 12px;
            padding: 10px 14px;
            position: relative;
            flex: 1;
        }
        
        .max-speech::before {
            content: '';
            position: absolute;
            left: -8px;
            top: 50%;
            transform: translateY(-50%);
            border: 8px solid transparent;
            border-right-color: white;
        }
        
        .max-text {
            font-size: 14px;
            color: #333;
            line-height: 1.4;
        }
        
        /* 棋盘 */
        .board-wrapper {
            background: linear-gradient(135deg, #D4A574, #C49A6C);
            padding: 10px;
            margin: 12px 16px;
            border-radius: 12px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.12);
        }
        
        .board {
            position: relative;
            width: 100%;
            aspect-ratio: 1/1.125;
            background: #E8C9A0;
        }
        
        .board-border {
            position: absolute;
            inset: 0;
            border: 2px solid #8B6914;
        }
        
        .grid-lines {
            position: absolute;
            inset: 0;
        }
        
        .grid-line-h {
            position: absolute;
            left: 0;
            right: 0;
            height: 1px;
            background: #8B6914;
        }
        
        .grid-line-v {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 1px;
            background: #8B6914;
        }
        
        .palace {
            position: absolute;
            left: 37.5%;
            width: 25%;
            height: 22.22%;
            border: 1px solid #8B6914;
        }
        
        .palace-top { top: 0; }
        .palace-bottom { bottom: 0; }
        
        .palace::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(45deg, transparent 49.5%, #8B6914 49.5%, #8B6914 50.5%, transparent 50.5%),
                        linear-gradient(-45deg, transparent 49.5%, #8B6914 49.5%, #8B6914 50.5%, transparent 50.5%);
        }
        
        .river-area {
            position: absolute;
            left: 0;
            right: 0;
            top: 44.44%;
            height: 11.11%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .river-text {
            font-size: 16px;
            color: #8B6914;
            font-weight: bold;
            letter-spacing: 8px;
        }
        
        .pieces-layer {
            position: absolute;
            inset: 0;
        }
        
        .piece {
            position: absolute;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            transform: translate(-50%, -50%);
            box-shadow: 0 3px 12px rgba(0,0,0,0.35), inset 0 2px 4px rgba(255,255,255,0.4);
            z-index: 10;
        }
        
        .piece.selected {
            box-shadow: 0 0 0 4px #2196F3, 0 3px 12px rgba(0,0,0,0.35);
        }
        
        .piece-red {
            background: linear-gradient(135deg, #D32F2F, #B71C1C);
            color: white;
            border: 2px solid #FFCDD2;
        }
        
        .piece-black {
            background: linear-gradient(135deg, #424242, #212121);
            color: white;
            border: 2px solid #BDBDBD;
        }
        
        .piece.target {
            background: rgba(76, 175, 80, 0.25);
            border: 2px dashed #4CAF50;
        }
        
        .valid-move {
            position: absolute;
            width: 12px;
            height: 12px;
            background: radial-gradient(circle, #4CAF50, #2E7D32);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            animation: validPulse 1.2s infinite;
            z-index: 5;
        }
        
        @keyframes validPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.85; }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.4; }
        }
        
        .move-effect {
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(33,150,243,0.5), transparent);
            transform: translate(-50%, -50%);
            pointer-events: none;
            animation: ripple 0.5s ease-out;
            z-index: 8;
        }
        
        @keyframes ripple {
            from { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
            to { transform: translate(-50%, -50%) scale(2); opacity: 0; }
        }
        
        .star-effect {
            position: absolute;
            font-size: 18px;
            pointer-events: none;
            animation: starFloat 0.8s ease-out forwards;
            z-index: 20;
        }
        
        @keyframes starFloat {
            0% { transform: translate(0, 0) scale(0); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(1.3); opacity: 0; }
        }
        
        /* 底部操作 */
        .actions {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-between;
            padding: 12px 16px;
            box-shadow: 0 -2px 12px rgba(0,0,0,0.08);
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
        }
        
        .action-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 12px 20px;
            border-radius: 24px;
            border: none;
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .btn-secondary {
            background: #F5F5F5;
            color: #666;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #2196F3, #1976D2);
            color: white;
        }
        
        /* 弹窗 */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 28px 24px;
            text-align: center;
            max-width: 300px;
            width: 90%;
        }
        
        .modal-icon {
            font-size: 56px;
            margin-bottom: 12px;
        }
        
        .modal-title {
            font-size: 22px;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
        }
        
        .modal-text {
            font-size: 14px;
            color: #666;
            margin-bottom: 16px;
        }
        
        .btn-modal {
            background: linear-gradient(135deg, #4CAF50, #388E3C);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 24px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
        }
        
        .shake {
            animation: shake 0.4s ease;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
        
        /* ===== 关卡结算界面（多邻国风格） ===== */
        .level-complete-screen {
            display: none;
            position: fixed;
            inset: 0;
            background: white;
            z-index: 200;
            flex-direction: column;
            align-items: center;
            padding: 40px 24px;
        }
        
        .level-complete-screen.show {
            display: flex;
        }
        
        .complete-mascot {
            width: 180px;
            height: 180px;
            margin-bottom: 20px;
            animation: mascotBounce 1s ease infinite alternate;
        }
        
        @keyframes mascotBounce {
            0% { transform: translateY(0) rotate(-3deg); }
            100% { transform: translateY(-10px) rotate(3deg); }
        }
        
        .complete-mascot svg {
            width: 100%;
            height: 100%;
        }
        
        .complete-title {
            font-size: 28px;
            font-weight: 800;
            color: #FFC107;
            margin-bottom: 8px;
        }
        
        .complete-subtitle {
            font-size: 16px;
            color: #666;
            margin-bottom: 32px;
        }
        
        .stats-row {
            display: flex;
            gap: 12px;
            width: 100%;
            max-width: 360px;
            margin-bottom: 32px;
        }
        
        .stat-card {
            flex: 1;
            background: white;
            border-radius: 16px;
            padding: 16px 8px;
            text-align: center;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            border: 2px solid transparent;
        }
        
        .stat-card.xp {
            border-color: #FFC107;
        }
        
        .stat-card.accuracy {
            border-color: #4CAF50;
        }
        
        .stat-card.speed {
            border-color: #2196F3;
        }
        
        .stat-card-header {
            font-size: 11px;
            color: #999;
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .stat-card-icon {
            font-size: 28px;
            margin-bottom: 4px;
        }
        
        .stat-card-value {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 2px;
        }
        
        .stat-card.xp .stat-card-value { color: #FFC107; }
        .stat-card.accuracy .stat-card-value { color: #4CAF50; }
        .stat-card.speed .stat-card-value { color: #2196F3; }
        
        .stat-card-label {
            font-size: 11px;
            color: #999;
            font-weight: 600;
        }
        
        .complete-btn {
            width: 100%;
            max-width: 360px;
            background: linear-gradient(135deg, #2196F3, #1976D2);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 16px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(33, 150, 243, 0.3);
        }
    </style>
</head>
<body>
    <!-- 游戏界面 -->
    <div class="game-screen" id="gameScreen">
        <div class="game-header">
            <div class="breadcrumb">第一章 · 棋子移动 · 移动马</div>
            <div class="streak-display">
                <span>🔥</span>
                <span id="streakText">3</span>
            </div>
        </div>
        
        <div class="ju-progress-section">
            <div class="ju-progress-header">
                <span class="ju-progress-title">本关进度</span>
                <span class="ju-progress-count"><span id="currentJu">1</span> / <span id="totalJu">10</span> 局</span>
            </div>
            <div class="ju-progress-bar">
                <div class="ju-progress-fill" id="juProgressFill" style="width: 10%"></div>
            </div>
        </div>
        
        <div class="level-info-card">
            <div class="level-tag" id="juTag">📚 教学</div>
            <div class="level-name" id="juName">向右上方走</div>
            <div class="level-desc" id="juDesc">学习马向右上方走日字</div>
        </div>
        
        <div class="max-container">
            <div class="max-avatar">
                <div class="max-eyes">
                    <div class="max-eye"></div>
                    <div class="max-eye"></div>
                </div>
            </div>
            <div class="max-speech">
                <div class="max-text" id="maxText">马走"日"字——先横或竖走一格，再斜走一格。点击马，向右上方走！</div>
            </div>
        </div>
        
        <div class="board-wrapper">
            <div class="board" id="board">
                <div class="board-border"></div>
                <div class="grid-lines" id="gridLines"></div>
                <div class="palace palace-top"></div>
                <div class="palace palace-bottom"></div>
                <div class="river-area">
                    <span class="river-text">楚 河 汉 界</span>
                </div>
                <div class="pieces-layer" id="piecesLayer"></div>
            </div>
        </div>
        
        <div class="actions">
            <button class="action-btn btn-secondary" onclick="resetGame()">
                <span>↩️</span>
                <span>重置</span>
            </button>
            <button class="action-btn btn-primary" onclick="showHint()">
                <span>💡</span>
                <span>提示</span>
            </button>
        </div>
    </div>
    
    <!-- 单局成功弹窗 -->
    <div class="modal" id="successModal">
        <div class="modal-content">
            <div class="modal-icon">🎉</div>
            <div class="modal-title">太棒了！</div>
            <div class="modal-text" id="successText">第1局完成！</div>
            <button class="btn-modal" onclick="nextJu()">继续 →</button>
        </div>
    </div>
    
    <!-- 关卡结算界面（多邻国风格） -->
    <div class="level-complete-screen" id="levelCompleteScreen">
        <div class="complete-mascot">
            <svg viewBox="0 0 200 200">
                <circle cx="100" cy="100" r="70" fill="#2196F3"/>
                <ellipse cx="50" cy="50" rx="25" ry="35" fill="#2196F3" transform="rotate(-30 50 50)"/>
                <ellipse cx="150" cy="50" rx="25" ry="35" fill="#2196F3" transform="rotate(30 150 50)"/>
                <ellipse cx="50" cy="55" rx="12" ry="18" fill="#64B5F6" transform="rotate(-30 50 55)"/>
                <ellipse cx="150" cy="55" rx="12" ry="18" fill="#64B5F6" transform="rotate(30 150 55)"/>
                <circle cx="75" cy="90" r="18" fill="white"/>
                <circle cx="125" cy="90" r="18" fill="white"/>
                <circle cx="78" cy="92" r="10" fill="#333"/>
                <circle cx="128" cy="92" r="10" fill="#333"/>
                <circle cx="80" cy="90" r="4" fill="white"/>
                <circle cx="130" cy="90" r="4" fill="white"/>
                <path d="M 60 70 Q 75 60 90 70" stroke="#333" stroke-width="3" fill="none"/>
                <path d="M 110 70 Q 125 60 140 70" stroke="#333" stroke-width="3" fill="none"/>
                <path d="M 85 125 Q 100 140 115 125" stroke="#333" stroke-width="3" fill="none"/>
                <circle cx="55" cy="115" r="12" fill="#FF8A80" opacity="0.6"/>
                <circle cx="145" cy="115" r="12" fill="#FF8A80" opacity="0.6"/>
            </svg>
        </div>
        
        <div class="complete-title">就学完了？</div>
        
        <div class="complete-subtitle">不到3分钟？这才叫速度！</div>
        
        <div class="stats-row">
            <div class="stat-card xp">
                <div class="stat-card-header">总经验</div>
                <div class="stat-card-icon">⚡</div>
                <div class="stat-card-value">+80</div>
                <div class="stat-card-label">XP</div>
            </div>
            
            <div class="stat-card accuracy">
                <div class="stat-card-header">稳扎稳打</div>
                <div class="stat-card-icon">🎯</div>
                <div class="stat-card-value">100%</div>
                <div class="stat-card-label">胜率</div>
            </div>
            
            <div class="stat-card speed">
                <div class="stat-card-header">无敌神速</div>
                <div class="stat-card-icon">⏱️</div>
                <div class="stat-card-value" id="finalTime">2:30</div>
                <div class="stat-card-label">用时</div>
            </div>
        </div>
        
        <button class="complete-btn" onclick="finishLevel()">领取经验</button>
    </div>
    
    <script>
        // 完整的10局数据（基于之前的设计）
        const jus = [
            // 教学局（1-3）
            {
                id: 1,
                tag: '📚 教学',
                name: '向右上方走',
                desc: '学习马向右上方走日字',
                maxText: '马走"日"字——先横或竖走一格，再斜走一格。点击马，向右上方走！',
                setup: {
                    horse: { x: 4, y: 7 },
                    targets: [{ x: 5, y: 5 }]
                }
            },
            {
                id: 2,
                tag: '📚 教学',
                name: '向左上方走',
                desc: '学习马向左上方走日字',
                maxText: '现在试试向左上方走！',
                setup: {
                    horse: { x: 4, y: 7 },
                    targets: [{ x: 3, y: 5 }]
                }
            },
            {
                id: 3,
                tag: '📚 教学',
                name: '四个方向',
                desc: '马可以走四个方向',
                maxText: '马有四个方向可以走！选一个目标走吧！',
                setup: {
                    horse: { x: 4, y: 7 },
                    targets: [{ x: 2, y: 6 }, { x: 6, y: 6 }]
                }
            },
            // 练习局（4-6）
            {
                id: 4,
                tag: '✏️ 练习',
                name: '吃子练习',
                desc: '吃掉对方的兵',
                maxText: '马不仅可以移动，还可以吃子！吃掉对方的兵！',
                setup: {
                    horse: { x: 4, y: 7 },
                    targets: [{ x: 2, y: 6, type: 'capture' }],
                    otherPieces: [{ x: 2, y: 6, type: 'black', piece: '卒' }]
                }
            },
            {
                id: 5,
                tag: '✏️ 练习',
                name: '吃子进阶',
                desc: '吃掉对方的炮',
                maxText: '继续练习吃子，这次吃掉炮！',
                setup: {
                    horse: { x: 3, y: 5 },
                    targets: [{ x: 5, y: 4, type: 'capture' }],
                    otherPieces: [{ x: 5, y: 4, type: 'black', piece: '炮' }]
                }
            },
            {
                id: 6,
                tag: '✏️ 练习',
                name: '躲避危险',
                desc: '从车威胁下逃脱',
                maxText: '危险！你的马被车盯上了！快用日字走法逃到安全位置！',
                setup: {
                    horse: { x: 4, y: 5 },
                    targets: [{ x: 2, y: 4 }, { x: 6, y: 4 }],
                    otherPieces: [{ x: 4, y: 2, type: 'black', piece: '车' }]
                }
            },
            // 巩固局（7-9）
            {
                id: 7,
                tag: '💪 巩固',
                name: '连续移动',
                desc: '走两步到达目标',
                maxText: '这次需要走两步！先走到中间位置，再到达终点！',
                setup: {
                    horse: { x: 4, y: 7 },
                    targets: [{ x: 3, y: 4 }],
                    intermediate: { x: 2, y: 6 }
                },
                multiStep: true
            },
            {
                id: 8,
                tag: '💪 巩固',
                name: '连续吃子',
                desc: '两步吃掉两个子',
                maxText: '连续吃子挑战！先吃掉卒，再吃掉炮！',
                setup: {
                    horse: { x: 4, y: 7 },
                    targets: [{ x: 2, y: 6, type: 'capture' }, { x: 4, y: 5, type: 'capture' }],
                    otherPieces: [
                        { x: 2, y: 6, type: 'black', piece: '卒' },
                        { x: 4, y: 5, type: 'black', piece: '炮' }
                    ]
                },
                multiStep: true
            },
            {
                id: 9,
                tag: '💪 巩固',
                name: '移动+吃子',
                desc: '先移动再吃子',
                maxText: '先移动到安全位置，然后吃掉对方的兵！',
                setup: {
                    horse: { x: 4, y: 7 },
                    targets: [{ x: 5, y: 4, type: 'capture' }],
                    intermediate: { x: 6, y: 6 },
                    otherPieces: [{ x: 5, y: 4, type: 'black', piece: '兵' }]
                },
                multiStep: true
            },
            // 考试局（10）
            {
                id: 10,
                tag: '📝 考试',
                name: '终极挑战',
                desc: '三步连续操作',
                maxText: '终极挑战！需要走三步：移动→躲避→吃子！',
                setup: {
                    horse: { x: 4, y: 7 },
                    targets: [{ x: 5, y: 3, type: 'capture' }],
                    otherPieces: [
                        { x: 4, y: 3, type: 'black', piece: '车' },
                        { x: 5, y: 3, type: 'black', piece: '卒' }
                    ]
                }
            }
        ];
        
        let currentJuIndex = 0;
        let selectedPiece = null;
        let validMoves = [];
        let levelStartTime = Date.now();
        let currentStep = 0;
        let capturedTargets = [];
        
        function init() {
            renderJu();
        }
        
        function renderJu() {
            const ju = jus[currentJuIndex];
            
            document.getElementById('currentJu').textContent = currentJuIndex + 1;
            document.getElementById('juProgressFill').style.width = ((currentJuIndex + 1) / 10 * 100) + '%';
            document.getElementById('juTag').textContent = ju.tag;
            document.getElementById('juName').textContent = ju.name;
            document.getElementById('juDesc').textContent = ju.desc;
            document.getElementById('maxText').textContent = ju.maxText;
            
            currentStep = 0;
            capturedTargets = [];
            
            renderBoard();
            renderPieces(ju);
        }
        
        function renderBoard() {
            const gridLines = document.getElementById('gridLines');
            gridLines.innerHTML = '';
            
            for (let i = 0; i <= 9; i++) {
                const line = document.createElement('div');
                line.className = 'grid-line-h';
                line.style.top = (i * 11.11) + '%';
                gridLines.appendChild(line);
            }
            
            for (let i = 0; i <= 8; i++) {
                const line1 = document.createElement('div');
                line1.className = 'grid-line-v';
                line1.style.left = (i * 12.5) + '%';
                line1.style.top = '0';
                line1.style.height = '44.44%';
                gridLines.appendChild(line1);
                
                const line2 = document.createElement('div');
                line2.className = 'grid-line-v';
                line2.style.left = (i * 12.5) + '%';
                line2.style.top = '55.55%';
                line2.style.height = '44.45%';
                gridLines.appendChild(line2);
            }
        }
        
        function renderPieces(ju) {
            const layer = document.getElementById('piecesLayer');
            layer.innerHTML = '';
            
            // 马
            const horse = document.createElement('div');
            horse.className = 'piece piece-red';
            horse.textContent = '馬';
            horse.id = 'horsePiece';
            
            let horseX = ju.setup.horse.x;
            let horseY = ju.setup.horse.y;
            
            // 多步关卡，使用当前位置
            if (ju.multiStep && currentStep > 0 && ju.setup.intermediate) {
                if (currentStep === 1) {
                    horseX = ju.setup.intermediate.x;
                    horseY = ju.setup.intermediate.y;
                }
            }
            
            horse.style.left = (horseX * 12.5) + '%';
            horse.style.top = (horseY * 11.11) + '%';
            horse.dataset.x = horseX;
            horse.dataset.y = horseY;
            horse.onclick = (e) => selectPiece(e, parseInt(horse.dataset.x), parseInt(horse.dataset.y));
            layer.appendChild(horse);
            
            // 其他棋子
            if (ju.setup.otherPieces) {
                ju.setup.otherPieces.forEach((p, idx) => {
                    // 检查是否已被吃掉
                    if (capturedTargets.some(ct => ct.x === p.x && ct.y === p.y)) {
                        return;
                    }
                    
                    const piece = document.createElement('div');
                    piece.className = 'piece piece-black';
                    piece.textContent = p.piece;
                    piece.style.left = (p.x * 12.5) + '%';
                    piece.style.top = (p.y * 11.11) + '%';
                    piece.dataset.x = p.x;
                    piece.dataset.y = p.y;
                    piece.dataset.idx = idx;
                    layer.appendChild(piece);
                });
            }
            
            // 目标
            if (ju.setup.targets) {
                ju.setup.targets.forEach((t, idx) => {
                    // 检查是否已完成
                    if (capturedTargets.some(ct => ct.x === t.x && ct.y === t.y)) {
                        return;
                    }
                    
                    const target = document.createElement('div');
                    target.className = 'piece target';
                    target.style.left = (t.x * 12.5) + '%';
                    target.style.top = (t.y * 11.11) + '%';
                    target.dataset.x = t.x;
                    target.dataset.y = t.y;
                    target.dataset.idx = idx;
                    target.onclick = () => moveToTarget(t);
                    layer.appendChild(target);
                });
            }
        }
        
        function selectPiece(e, x, y) {
            e.stopPropagation();
            
            document.querySelectorAll('.piece').forEach(p => p.classList.remove('selected'));
            document.querySelectorAll('.valid-move').forEach(m => m.remove());
            
            const piece = e.target;
            piece.classList.add('selected');
            selectedPiece = { x, y, element: piece };
            
            validMoves = calculateHorseMoves(x, y);
            showValidMoves(validMoves);
        }
        
        function calculateHorseMoves(x, y) {
            const moves = [];
            const ju = jus[currentJuIndex];
            
            const directions = [
                { dx: 1, dy: 2, blockX: 0, blockY: 1 },
                { dx: 2, dy: 1, blockX: 1, blockY: 0 },
                { dx: 2, dy: -1, blockX: 1, blockY: 0 },
                { dx: 1, dy: -2, blockX: 0, blockY: -1 },
                { dx: -1, dy: -2, blockX: 0, blockY: -1 },
                { dx: -2, dy: -1, blockX: -1, blockY: 0 },
                { dx: -2, dy: 1, blockX: -1, blockY: 0 },
                { dx: -1, dy: 2, blockX: 0, blockY: 1 }
            ];
            
            directions.forEach(dir => {
                const newX = x + dir.dx;
                const newY = y + dir.dy;
                const blockX = x + dir.blockX;
                const blockY = y + dir.blockY;
                
                if (newX < 0 || newX > 8 || newY < 0 || newY > 9) return;
                
                // 检查是否被蹩马腿
                const blocked = ju.setup.otherPieces?.some(p => 
                    p.x === blockX && p.y === blockY && 
                    !capturedTargets.some(ct => ct.x === p.x && ct.y === p.y)
                );
                
                if (!blocked) {
                    moves.push({ x: newX, y: newY });
                }
            });
            
            return moves;
        }
        
        function showValidMoves(moves) {
            const layer = document.getElementById('piecesLayer');
            moves.forEach(move => {
                const indicator = document.createElement('div');
                indicator.className = 'valid-move';
                indicator.style.left = (move.x * 12.5) + '%';
                indicator.style.top = (move.y * 11.11) + '%';
                layer.appendChild(indicator);
            });
        }
        
        function moveToTarget(target) {
            if (!selectedPiece) return;
            
            const isValid = validMoves.some(m => m.x === target.x && m.y === target.y);
            
            if (!isValid) {
                document.querySelector('.board-wrapper').classList.add('shake');
                setTimeout(() => {
                    document.querySelector('.board-wrapper').classList.remove('shake');
                }, 400);
                return;
            }
            
            // 移动效果
            const effect = document.createElement('div');
            effect.className = 'move-effect';
            effect.style.left = (target.x * 12.5) + '%';
            effect.style.top = (target.y * 11.11) + '%';
            document.getElementById('piecesLayer').appendChild(effect);
            setTimeout(() => effect.remove(), 500);
            
            // 移动马
            selectedPiece.element.style.left = (target.x * 12.5) + '%';
            selectedPiece.element.style.top = (target.y * 11.11) + '%';
            selectedPiece.element.dataset.x = target.x;
            selectedPiece.element.dataset.y = target.y;
            
            document.querySelectorAll('.piece').forEach(p => p.classList.remove('selected'));
            document.querySelectorAll('.valid-move').forEach(m => m.remove());
            
            // 吃子处理
            if (target.type === 'capture') {
                const targetPiece = document.querySelector(`[data-x="${target.x}"][data-y="${target.y}"].piece-black`);
                if (targetPiece) {
                    targetPiece.remove();
                }
            }
            
            // 记录已完成的目标
            capturedTargets.push({ x: target.x, y: target.y });
            
            const ju = jus[currentJuIndex];
            
            // 多步关卡处理
            if (ju.multiStep && ju.setup.targets.length > capturedTargets.length) {
                currentStep++;
                document.getElementById('maxText').textContent = `很好！还有 ${ju.setup.targets.length - capturedTargets.length} 个目标，继续！`;
                
                // 重新渲染以更新目标
                setTimeout(() => {
                    renderPieces(ju);
                    
                    // 自动选中马
                    const horse = document.getElementById('horsePiece');
                    if (horse) {
                        horse.classList.add('selected');
                        const hx = parseInt(horse.dataset.x);
                        const hy = parseInt(horse.dataset.y);
                        selectedPiece = { x: hx, y: hy, element: horse };
                        validMoves = calculateHorseMoves(hx, hy);
                        showValidMoves(validMoves);
                    }
                }, 300);
                
                return;
            }
            
            // 完成本局
            setTimeout(() => {
                for (let i = 0; i < 6; i++) {
                    const star = document.createElement('div');
                    star.className = 'star-effect';
                    star.textContent = '⭐';
                    star.style.left = (target.x * 12.5) + '%';
                    star.style.top = (target.y * 11.11) + '%';
                    const angle = (i / 6) * Math.PI * 2;
                    star.style.setProperty('--tx', Math.cos(angle) * 50 + 'px');
                    star.style.setProperty('--ty', Math.sin(angle) * 50 + 'px');
                    document.getElementById('piecesLayer').appendChild(star);
                    setTimeout(() => star.remove(), 800);
                }
                
                document.getElementById('successText').textContent = `第${currentJuIndex + 1}局完成！`;
                document.getElementById('successModal').classList.add('show');
            }, 250);
        }
        
        function nextJu() {
            document.getElementById('successModal').classList.remove('show');
            
            if (currentJuIndex + 1 < 10) {
                currentJuIndex++;
                renderJu();
            } else {
                // 关完成，显示结算
                showLevelComplete();
            }
        }
        
        function showLevelComplete() {
            const elapsed = Math.floor((Date.now() - levelStartTime) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            document.getElementById('finalTime').textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
            
            document.getElementById('levelCompleteScreen').classList.add('show');
        }
        
        function finishLevel() {
            document.getElementById('levelCompleteScreen').classList.remove('show');
            // 返回关路径
            alert('关卡完成！返回关路径...');
        }
        
        function resetGame() {
            selectedPiece = null;
            validMoves = [];
            currentStep = 0;
            capturedTargets = [];
            document.querySelectorAll('.piece').forEach(p => p.classList.remove('selected'));
            document.querySelectorAll('.valid-move').forEach(m => m.remove());
            renderPieces(jus[currentJuIndex]);
        }
        
        function showHint() {
            document.getElementById('maxText').textContent = '提示：马走日字，先直走一格再斜走一格，注意不要被蹩马腿！';
        }
        
        document.getElementById('board').onclick = function(e) {
            if (e.target === this || e.target.classList.contains('grid-lines')) {
                document.querySelectorAll('.piece').forEach(p => p.classList.remove('selected'));
                document.querySelectorAll('.valid-move').forEach(m => m.remove());
                selectedPiece = null;
            }
        };
        
        init();
    </script>
</body>
</html>
