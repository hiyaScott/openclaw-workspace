<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>象棋大师 - 修正版原型</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: #F5F5F5;
            min-height: 100vh;
            padding-bottom: 80px;
        }
        
        /* 顶部 */
        .header {
            background: white;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .back-btn {
            font-size: 20px;
            color: #666;
            cursor: pointer;
        }
        
        /* 关卡进度 */
        .level-indicator {
            background: white;
            padding: 12px 16px;
            border-bottom: 1px solid #eee;
        }
        
        .level-dots {
            display: flex;
            gap: 8px;
            justify-content: center;
        }
        
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #E0E0E0;
        }
        
        .dot.completed {
            background: #4CAF50;
        }
        
        .dot.current {
            background: #2196F3;
            transform: scale(1.3);
        }
        
        /* 标题区 */
        .lesson-header {
            background: white;
            padding: 16px;
        }
        
        .lesson-tag {
            display: inline-block;
            background: #E3F2FD;
            color: #2196F3;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            margin-bottom: 8px;
        }
        
        .lesson-title {
            font-size: 22px;
            font-weight: 700;
            color: #333;
        }
        
        .lesson-subtitle {
            font-size: 14px;
            color: #666;
            margin-top: 4px;
        }
        
        /* Max */
        .max-container {
            display: flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, #E3F2FD, #BBDEFB);
            border-radius: 16px;
            padding: 16px;
            margin: 16px;
        }
        
        .max-avatar {
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 50%;
            border: 3px solid #2196F3;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .max-eyes {
            display: flex;
            gap: 4px;
        }
        
        .eye {
            width: 6px;
            height: 10px;
            background: #333;
            border-radius: 50%;
        }
        
        .max-speech {
            background: white;
            border-radius: 12px;
            padding: 12px 16px;
            position: relative;
            flex: 1;
        }
        
        .max-speech::before {
            content: '';
            position: absolute;
            left: -8px;
            top: 50%;
            transform: translateY(-50%);
            border: 8px solid transparent;
            border-right-color: white;
        }
        
        .max-text {
            font-size: 14px;
            color: #333;
            line-height: 1.5;
        }
        
        /* 正式棋盘 */
        .board-wrapper {
            background: #D4A574;
            padding: 20px;
            margin: 16px;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
        }
        
        .board {
            position: relative;
            width: 100%;
            aspect-ratio: 9/10;
            background: #E8C9A0;
        }
        
        /* 棋盘网格线 */
        .grid-lines {
            position: absolute;
            inset: 0;
        }
        
        .grid-line-h {
            position: absolute;
            left: 0;
            right: 0;
            height: 1px;
            background: #8B6914;
        }
        
        .grid-line-v {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 1px;
            background: #8B6914;
        }
        
        /* 楚河汉界 */
        .river {
            position: absolute;
            left: 0;
            right: 0;
            top: 40%;
            height: 20%;
            display: flex;
            align-items: center;
            justify-content: center;
            border-top: 2px solid #8B6914;
            border-bottom: 2px solid #8B6914;
        }
        
        .river-text {
            font-size: 24px;
            color: #8B6914;
            font-weight: bold;
            letter-spacing: 8px;
        }
        
        /* 九宫 */
        .palace {
            position: absolute;
            left: 33.33%;
            width: 33.33%;
            height: 20%;
            border: 2px solid #8B6914;
        }
        
        .palace-top {
            top: 0;
        }
        
        .palace-bottom {
            bottom: 0;
        }
        
        .palace::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(45deg, transparent 49%, #8B6914 49%, #8B6914 51%, transparent 51%),
                        linear-gradient(-45deg, transparent 49%, #8B6914 49%, #8B6914 51%, transparent 51%);
        }
        
        /* 棋子 */
        .pieces-layer {
            position: absolute;
            inset: 0;
        }
        
        .piece {
            position: absolute;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            transform: translate(-50%, -50%);
            box-shadow: 0 3px 8px rgba(0,0,0,0.3), inset 0 2px 4px rgba(255,255,255,0.3);
        }
        
        .piece:hover {
            transform: translate(-50%, -50%) scale(1.1);
        }
        
        .piece.selected {
            box-shadow: 0 0 0 4px #2196F3, 0 3px 8px rgba(0,0,0,0.3);
        }
        
        .piece-red {
            background: linear-gradient(135deg, #D32F2F, #B71C1C);
            color: white;
            border: 2px solid #FFCDD2;
        }
        
        .piece-black {
            background: linear-gradient(135deg, #424242, #212121);
            color: white;
            border: 2px solid #BDBDBD;
        }
        
        .piece.target {
            background: rgba(76, 175, 80, 0.3);
            border: 2px dashed #4CAF50;
        }
        
        /* 合法移动提示 */
        .valid-move {
            position: absolute;
            width: 12px;
            height: 12px;
            background: rgba(76, 175, 80, 0.6);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        
        /* 底部操作 */
        .actions {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-between;
            padding: 12px 16px;
            box-shadow: 0 -2px 8px rgba(0,0,0,0.05);
        }
        
        .action-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 24px;
            border: none;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .action-btn:active {
            transform: scale(0.95);
        }
        
        .btn-secondary {
            background: #F5F5F5;
            color: #666;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #2196F3, #1976D2);
            color: white;
        }
        
        /* 成功弹窗 */
        .success-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        
        .success-modal.show {
            display: flex;
        }
        
        .success-content {
            background: white;
            border-radius: 20px;
            padding: 32px;
            text-align: center;
            max-width: 300px;
        }
        
        .success-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
        
        .success-title {
            font-size: 24px;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
        }
        
        .success-text {
            font-size: 14px;
            color: #666;
            margin-bottom: 24px;
        }
        
        .success-reward {
            font-size: 18px;
            color: #2196F3;
            font-weight: 600;
            margin-bottom: 24px;
        }
        
        .btn-continue {
            background: linear-gradient(135deg, #4CAF50, #388E3C);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 24px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header">
        <span class="back-btn" onclick="location.reload()">←</span>
        <span style="font-weight: 700;">认识马：马走日</span>
        <span>⚡ ∞</span>
    </div>
    
    <!-- 关卡进度指示器 -->
    <div class="level-indicator">
        <div class="level-dots" id="levelDots">
            <!-- 动态生成 -->
        </div>
    </div>
    
    <div class="lesson-header">
        <span class="lesson-tag">💡 实战练习 <span id="subLevelNum">1/3</span></span>
        <div class="lesson-title" id="lessonTitle">走"日"字吃子</div>
        <div class="lesson-subtitle" id="lessonSubtitle">马走日，吃掉对方的炮！</div>
    </div>
    
    <div class="max-container">
        <div class="max-avatar">
            <div class="max-eyes">
                <div class="eye"></div>
                <div class="eye"></div>
            </div>
        </div>
        <div class="max-speech">
            <div class="max-text" id="maxText">马走"日"字——先横或竖走一格，再斜走一格。点击马，看看能走到哪？</div>
        </div>
    </div>
    
    <!-- 正式棋盘 -->
    <div class="board-wrapper">
        <div class="board" id="board">
            <!-- 网格线 -->
            <div class="grid-lines" id="gridLines"></div>
            
            <!-- 楚河汉界 -->
            <div class="river">
                <span class="river-text">楚 河 汉 界</span>
            </div>
            
            <!-- 九宫 -->
            <div class="palace palace-top"></div>
            <div class="palace palace-bottom"></div>
            
            <!-- 棋子层 -->
            <div class="pieces-layer" id="piecesLayer">
                <!-- 动态生成 -->
            </div>
        </div>
    </div>
    
    <div class="actions">
        <button class="action-btn btn-secondary" onclick="resetLevel()">
            <span>↩️</span>
            <span>重置</span>
        </button>
        <button class="action-btn btn-primary" onclick="showHint()">
            <span>💡</span>
            <span>提示</span>
        </button>
    </div>
    
    <!-- 成功弹窗 -->
    <div class="success-modal" id="successModal">
        <div class="success-content">
            <div class="success-icon">🎉</div>
            <div class="success-title">太棒了！</div>
            <div class="success-text" id="successText">你掌握了马走日！</div>
            <div class="success-reward">+10 宝石 💎</div>
            <button class="btn-continue" onclick="nextSubLevel()">继续 →</button>
        </div>
    </div>
    
    <script>
        // 子关卡配置（一个主题多个小关卡）
        const subLevels = [
            {
                title: '走"日"字吃子',
                subtitle: '马走日，吃掉对方的炮！',
                maxText: '马走"日"字——先横或竖走一格，再斜走一格。点击马，看看能走到哪？',
                setup: {
                    horse: { x: 4, y: 6 },
                    targets: [{ x: 2, y: 5, type: 'capture', piece: '炮' }],
                    otherPieces: [
                        { x: 2, y: 5, type: 'black', piece: '炮' }
                    ]
                },
                successText: '太棒了！马走日吃子，你学会了！'
            },
            {
                title: '走"日"字逃脱',
                subtitle: '马被车威胁了，走日字逃脱！',
                maxText: '马被车盯上了！快用"日"字走法逃到安全位置！',
                setup: {
                    horse: { x: 4, y: 5 },
                    targets: [{ x: 2, y: 4, type: 'escape' }, { x: 6, y: 4, type: 'escape' }],
                    otherPieces: [
                        { x: 4, y: 2, type: 'black', piece: '车' }
                    ]
                },
                successText: '好样的！马走日逃脱成功！'
            },
            {
                title: '蹩马腿',
                subtitle: '注意！马前面有棋子会蹩住马腿',
                maxText: '马前面有棋子时，会被"蹩马腿"，那个方向就不能走了。试试看！',
                setup: {
                    horse: { x: 4, y: 6 },
                    targets: [{ x: 6, y: 5, type: 'normal' }],
                    otherPieces: [
                        { x: 4, y: 5, type: 'black', piece: '卒' }
                    ],
                    blockedMoves: [{ x: 2, y: 5 }, { x: 2, y: 7 }]
                },
                successText: '完美！你理解了蹩马腿！'
            }
        ];
        
        let currentSubLevel = 0;
        let selectedPiece = null;
        let validMoves = [];
        
        // 初始化
        function init() {
            renderLevelDots();
            renderBoard();
            renderPieces();
        }
        
        // 渲染关卡进度点
        function renderLevelDots() {
            const dots = document.getElementById('levelDots');
            dots.innerHTML = '';
            for (let i = 0; i < subLevels.length; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot';
                if (i < currentSubLevel) dot.classList.add('completed');
                if (i === currentSubLevel) dot.classList.add('current');
                dots.appendChild(dot);
            }
        }
        
        // 渲染棋盘网格线
        function renderBoard() {
            const gridLines = document.getElementById('gridLines');
            
            // 横线
            for (let i = 0; i <= 9; i++) {
                const line = document.createElement('div');
                line.className = 'grid-line-h';
                line.style.top = (i * 10) + '%';
                gridLines.appendChild(line);
            }
            
            // 竖线（上半部分）
            for (let i = 0; i <= 8; i++) {
                const line = document.createElement('div');
                line.className = 'grid-line-v';
                line.style.left = (i * 11.11) + '%';
                line.style.height = '40%';
                gridLines.appendChild(line);
                
                // 下半部分
                const line2 = document.createElement('div');
                line2.className = 'grid-line-v';
                line2.style.left = (i * 11.11) + '%';
                line2.style.top = '60%';
                line2.style.height = '40%';
                gridLines.appendChild(line2);
            }
        }
        
        // 渲染棋子
        function renderPieces() {
            const layer = document.getElementById('piecesLayer');
            layer.innerHTML = '';
            
            const level = subLevels[currentSubLevel];
            
            // 马
            const horse = document.createElement('div');
            horse.className = 'piece piece-red';
            horse.textContent = '馬';
            horse.style.left = (level.setup.horse.x * 11.11 + 5.55) + '%';
            horse.style.top = (level.setup.horse.y * 10 + 5) + '%';
            horse.onclick = (e) => selectPiece(e, level.setup.horse.x, level.setup.horse.y);
            layer.appendChild(horse);
            
            // 其他棋子
            if (level.setup.otherPieces) {
                level.setup.otherPieces.forEach(p => {
                    const piece = document.createElement('div');
                    piece.className = 'piece piece-' + p.type;
                    piece.textContent = p.piece;
                    piece.style.left = (p.x * 11.11 + 5.55) + '%';
                    piece.style.top = (p.y * 10 + 5) + '%';
                    piece.dataset.x = p.x;
                    piece.dataset.y = p.y;
                    layer.appendChild(piece);
                });
            }
            
            // 目标标记
            if (level.setup.targets) {
                level.setup.targets.forEach(t => {
                    const target = document.createElement('div');
                    target.className = 'piece target';
                    target.style.left = (t.x * 11.11 + 5.55) + '%';
                    target.style.top = (t.y * 10 + 5) + '%';
                    target.dataset.x = t.x;
                    target.dataset.y = t.y;
                    target.dataset.type = t.type;
                    target.onclick = () => moveToTarget(t);
                    layer.appendChild(target);
                });
            }
        }
        
        // 选择马
        function selectPiece(e, x, y) {
            e.stopPropagation();
            
            // 清除之前的选择
            document.querySelectorAll('.piece').forEach(p => p.classList.remove('selected'));
            document.querySelectorAll('.valid-move').forEach(m => m.remove());
            
            const piece = e.target;
            piece.classList.add('selected');
            selectedPiece = { x, y, element: piece };
            
            // 计算并显示合法移动（马走日）
            validMoves = calculateHorseMoves(x, y);
            showValidMoves(validMoves);
        }
        
        // 计算马的合法移动（严格日字）
        function calculateHorseMoves(x, y) {
            const moves = [];
            const level = subLevels[currentSubLevel];
            
            // 马走日的8个方向
            const directions = [
                { dx: 1, dy: 2, blockX: 0, blockY: 1 },   // 右2上1，蹩脚点
                { dx: 2, dy: 1, blockX: 1, blockY: 0 },   // 右1上2
                { dx: 2, dy: -1, blockX: 1, blockY: 0 },  // 右1下2
                { dx: 1, dy: -2, blockX: 0, blockY: -1 }, // 右2下1
                { dx: -1, dy: -2, blockX: 0, blockY: -1 },// 左2下1
                { dx: -2, dy: -1, blockX: -1, blockY: 0 },// 左1下2
                { dx: -2, dy: 1, blockX: -1, blockY: 0 }, // 左1上2
                { dx: -1, dy: 2, blockX: 0, blockY: 1 }   // 左2上1
            ];
            
            directions.forEach(dir => {
                const newX = x + dir.dx;
                const newY = y + dir.dy;
                const blockX = x + dir.blockX;
                const blockY = y + dir.blockY;
                
                // 检查边界
                if (newX < 0 || newX > 8 || newY < 0 || newY > 9) return;
                
                // 检查蹩马腿
                const blocked = level.setup.otherPieces?.some(p => 
                    p.x === blockX && p.y === blockY
                );
                
                if (!blocked) {
                    moves.push({ x: newX, y: newY });
                }
            });
            
            return moves;
        }
        
        // 显示合法移动
        function showValidMoves(moves) {
            const layer = document.getElementById('piecesLayer');
            moves.forEach(move => {
                const indicator = document.createElement('div');
                indicator.className = 'valid-move';
                indicator.style.left = (move.x * 11.11 + 5.55) + '%';
                indicator.style.top = (move.y * 10 + 5) + '%';
                layer.appendChild(indicator);
            });
        }
        
        // 移动到目标
        function moveToTarget(target) {
            if (!selectedPiece) {
                updateMaxText('先点击选择你的马！');
                return;
            }
            
            // 检查是否是合法移动
            const isValid = validMoves.some(m => m.x === target.x && m.y === target.y);
            
            if (!isValid) {
                updateMaxText('马走"日"字，这个位置走不到哦！再试试？');
                return;
            }
            
            // 移动棋子
            selectedPiece.element.style.left = (target.x * 11.11 + 5.55) + '%';
            selectedPiece.element.style.top = (target.y * 10 + 5) + '%';
            
            // 清除选择
            document.querySelectorAll('.piece').forEach(p => p.classList.remove('selected'));
            document.querySelectorAll('.valid-move').forEach(m => m.remove());
            
            // 检查是否吃掉目标
            if (target.type === 'capture') {
                const targetPiece = document.querySelector(`[data-x="${target.x}"][data-y="${target.y}"]`);
                if (targetPiece && targetPiece.classList.contains('piece-black')) {
                    targetPiece.remove();
                }
            }
            
            // 成功！
            setTimeout(() => {
                showSuccess();
            }, 300);
        }
        
        // 更新Max对话
        function updateMaxText(text) {
            document.getElementById('maxText').textContent = text;
        }
        
        // 显示提示
        function showHint() {
            const level = subLevels[currentSubLevel];
            const target = level.setup.targets[0];
            updateMaxText(`提示：马在 (${level.setup.horse.x}, ${level.setup.horse.y})，目标是 (${target.x}, ${target.y})，形成"日"字！`);
        }
        
        // 显示成功
        function showSuccess() {
            const level = subLevels[currentSubLevel];
            document.getElementById('successText').textContent = level.successText;
            document.getElementById('successModal').classList.add('show');
        }
        
        // 下一子关卡
        function nextSubLevel() {
            document.getElementById('successModal').classList.remove('show');
            currentSubLevel++;
            
            if (currentSubLevel >= subLevels.length) {
                alert('恭喜完成所有练习！关卡完成！🏆');
                currentSubLevel = 0;
            }
            
            // 更新UI
            const level = subLevels[currentSubLevel];
            document.getElementById('subLevelNum').textContent = (currentSubLevel + 1) + '/3';
            document.getElementById('lessonTitle').textContent = level.title;
            document.getElementById('lessonSubtitle').textContent = level.subtitle;
            updateMaxText(level.maxText);
            
            selectedPiece = null;
            validMoves = [];
            
            renderLevelDots();
            renderPieces();
        }
        
        // 重置当前关卡
        function resetLevel() {
            selectedPiece = null;
            validMoves = [];
            document.querySelectorAll('.piece').forEach(p => p.classList.remove('selected'));
            document.querySelectorAll('.valid-move').forEach(m => m.remove());
            renderPieces();
            updateMaxText(subLevels[currentSubLevel].maxText);
        }
        
        // 初始化
        init();
    </script>
</body>
</html>
